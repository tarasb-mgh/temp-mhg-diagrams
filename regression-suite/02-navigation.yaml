# MHG Workbench Regression Suite — 02 Navigation & Shell
# 12 tests covering sidebar groups, collapse/expand, breadcrumbs, group scope,
# language switching (EN/UK/RU), and PII mask toggle.
#
# All tests assume owner role and depend on AUTH-001 for an active session.

module:
  id: 02-navigation
  title: "Navigation & Shell"
  description: >
    Validates that the workbench shell renders correctly: sidebar groups expand
    with the correct sub-items, collapse toggle works, group scope selector
    changes data context, language selector switches UI locale, and PII mask
    toggle functions.
  gate: false

tests:

  # ---------------------------------------------------------------------------
  # NAV-001  All sidebar groups render
  # ---------------------------------------------------------------------------
  - id: NAV-001
    title: "All sidebar groups render"
    priority: P0
    tags: [navigation, sidebar, smoke]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner with full sidebar access"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}"
        assert: "Workbench loaded"
        expect: "Dashboard with sidebar visible"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 10000
        assert: "Sidebar container is visible"

      - action: browser_snapshot
        params: {}
        assert: "Full sidebar snapshot captured"
        expect: >
          All top-level navigation groups are present: Dashboard, Reviews,
          Surveys, People & Access, Security, Group Resources, Settings

      - action: evidence_capture
        params:
          label: "NAV-001-sidebar-groups"
          include: [screenshot]
        assert: "Evidence captured"

    pass_criteria:
      - "'Dashboard' link or item is visible in the sidebar"
      - "'Reviews' group is visible in the sidebar"
      - "'Surveys' group is visible in the sidebar"
      - "'People & Access' group is visible in the sidebar"
      - "'Security' group is visible in the sidebar"
      - "'Group Resources' group is visible in the sidebar"
      - "'Settings' link or item is visible in the sidebar"
    error_signatures:
      - pattern: "403.*api/permissions"
        meaning: "Permission fetch failed — sidebar may be incomplete"
      - pattern: "undefined.*sidebar"
        meaning: "Sidebar data not loaded"

  # ---------------------------------------------------------------------------
  # NAV-002  Sidebar collapse/expand toggle
  # ---------------------------------------------------------------------------
  - id: NAV-002
    title: "Sidebar collapse/expand toggle"
    priority: P1
    tags: [navigation, sidebar, toggle]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner; sidebar is currently expanded"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}"
        assert: "Workbench loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 10000
        assert: "Sidebar visible"

      - action: browser_snapshot
        params: {}
        assert: "Initial expanded sidebar captured"
        expect: "Sidebar is in expanded state with visible text labels"

      - action: browser_click
        params:
          selector: "button[aria-label*='collapse' i], button[aria-label*='toggle' i], button[aria-label*='menu' i], [data-testid*='collapse' i], [data-testid*='sidebar-toggle' i]"
        assert: "Collapse button clicked"
        expect: "Sidebar transitions to collapsed state"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 3000
        assert: "Sidebar still in DOM but collapsed"

      - action: browser_snapshot
        params: {}
        assert: "Collapsed sidebar snapshot"
        expect: >
          Sidebar is in collapsed state — text labels are hidden or sidebar
          width is significantly reduced; icons may still be visible

      - action: browser_click
        params:
          selector: "button[aria-label*='expand' i], button[aria-label*='toggle' i], button[aria-label*='menu' i], [data-testid*='expand' i], [data-testid*='sidebar-toggle' i]"
        assert: "Expand button clicked"
        expect: "Sidebar transitions back to expanded state"

      - action: browser_snapshot
        params: {}
        assert: "Re-expanded sidebar snapshot"
        expect: "Sidebar is back to expanded state with visible text labels"

      - action: evidence_capture
        params:
          label: "NAV-002-sidebar-toggle"
          include: [screenshot]
        assert: "Evidence captured"

    pass_criteria:
      - "Sidebar collapses when toggle button is clicked (labels disappear or width shrinks)"
      - "Sidebar expands when toggle button is clicked again (labels reappear)"
      - "No layout breakage or overlapping content during transition"
    error_signatures:
      - pattern: "TypeError"
        meaning: "Crash in sidebar toggle handler"

