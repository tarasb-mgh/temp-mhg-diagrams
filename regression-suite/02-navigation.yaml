  # ---------------------------------------------------------------------------
  # NAV-008  Breadcrumb on nested pages
  # ---------------------------------------------------------------------------
  - id: NAV-008
    title: "Breadcrumb on nested pages"
    priority: P2
    tags: [navigation, breadcrumb, review]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner"
      - "At least one review session exists in the review queue"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}"
        assert: "Workbench loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 10000
        assert: "Sidebar visible"

      - action: browser_click
        params:
          selector: "nav >> text=Reviews, aside >> text=Reviews, [class*='sidebar'] >> text=Reviews"
        assert: "Reviews group expanded"

      - action: browser_click
        params:
          selector: "text='Review Queue', a:has-text('Review Queue'), [href*='review-queue'], [href*='review/queue']"
        assert: "Review Queue clicked"
        expect: "Review Queue page loads with session list"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "table, [class*='list' i], [class*='queue' i], [data-testid*='review' i]"
          timeout: 10000
        assert: "Review queue content loaded"

      - action: browser_snapshot
        params: {}
        assert: "Review queue page captured"
        expect: "Review queue shows a list of sessions"

      - action: browser_click
        params:
          selector: "table tbody tr:first-child, [class*='list'] > *:first-child, [class*='queue'] a:first-child, [data-testid*='session']:first-of-type"
        assert: "First review session clicked"
        expect: "Session detail page loads"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='breadcrumb' i], nav[aria-label='breadcrumb'], [data-testid*='breadcrumb' i]"
          timeout: 10000
        assert: "Breadcrumb navigation is visible"

      - action: browser_snapshot
        params: {}
        assert: "Breadcrumb on session detail captured"
        expect: >
          Breadcrumb shows navigation path, e.g., "Reviews > Review Queue > Session"
          or similar hierarchical path

      - action: evidence_capture
        params:
          label: "NAV-008-breadcrumb"
          include: [screenshot]
        assert: "Evidence captured"

    pass_criteria:
      - "Breadcrumb navigation is visible on the nested session detail page"
      - "Breadcrumb shows at least two levels of hierarchy"
      - "Breadcrumb links are clickable for navigation back"
    error_signatures:
      - pattern: "TypeError"
        meaning: "Crash rendering breadcrumb component"
      - pattern: "undefined.*breadcrumb"
        meaning: "Breadcrumb data not populated for this route"

  # ---------------------------------------------------------------------------
  # NAV-009  Group scope selector changes data
  # ---------------------------------------------------------------------------
  - id: NAV-009
    title: "Group scope selector changes data"
    priority: P0
    tags: [navigation, group-scope, data-context, smoke]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner"
      - "Owner has access to at least two groups"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}"
        assert: "Workbench loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 10000
        assert: "Sidebar visible"

      - action: browser_snapshot
        params: {}
        assert: "Initial state with current group captured"
        expect: "Group selector (combobox/dropdown) is visible in header or sidebar"

      - action: browser_click
        params:
          selector: "[data-testid*='group-select' i], [class*='group-select' i], [aria-label*='group' i], select[name*='group' i], [role='combobox']:has-text('group'), [class*='scope' i]"
        assert: "Group selector opened"
        expect: "Dropdown or listbox with available groups appears"

      - action: browser_snapshot
        params: {}
        assert: "Group selector dropdown captured"
        expect: "At least two group options are visible"

      - action: browser_select_option
        params:
          selector: "[data-testid*='group-select' i], [class*='group-select' i], select[name*='group' i]"
          value: 1
          by: "index"
        assert: "Second group option selected (index 1)"
        expect: "Page data refreshes to reflect the new group context"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[data-testid='dashboard'], [class*='dashboard' i], [class*='content' i]"
          timeout: 10000
        assert: "Page content refreshed after group change"

      - action: browser_snapshot
        params: {}
        assert: "Post-group-change state captured"
        expect: "Dashboard content reflects the newly selected group"

      - action: browser_network_requests
        params: {}
        assert: "Network requests captured after group change"
        expect: "API calls include group ID parameter matching the new selection"

      - action: evidence_capture
        params:
          label: "NAV-009-group-scope"
          include: [screenshot, network]
        assert: "Evidence captured"

    pass_criteria:
      - "Group scope selector is present and interactive"
      - "Changing group selection triggers data refresh (visible in network requests)"
      - "Page content updates to reflect the new group context"
    error_signatures:
      - pattern: "403.*api/"
        meaning: "Permission denied for newly selected group"
      - pattern: "TypeError"
        meaning: "Crash when switching group context"
      - pattern: "500"
        meaning: "Backend error on group-scoped data fetch"

  # ---------------------------------------------------------------------------
  # NAV-010  Language selector to Ukrainian
  # ---------------------------------------------------------------------------
  - id: NAV-010
    title: "Language selector to Ukrainian"
    priority: P1
    tags: [navigation, i18n, locale, ukrainian]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner"
      - "Current locale is English (default)"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}"
        assert: "Workbench loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 10000
        assert: "Sidebar visible"

      - action: browser_snapshot
        params: {}
        assert: "Initial English locale state captured"
        expect: "Sidebar labels in English; language selector visible"

      - action: browser_click
        params:
          selector: "[data-testid*='language' i], [data-testid*='locale' i], [class*='language' i], [aria-label*='language' i], select[name*='lang' i], [role='combobox']"
        assert: "Language selector opened"
        expect: "Language options dropdown appears"

      - action: browser_select_option
        params:
          selector: "[data-testid*='language' i], [data-testid*='locale' i], select[name*='lang' i]"
          value: "uk"
        assert: "Ukrainian locale selected"
        expect: "UI begins switching to Ukrainian"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "text=Рецензування, text=Огляди"
          timeout: 5000
        assert: "Ukrainian text appears in sidebar"

      - action: browser_snapshot
        params: {}
        assert: "Ukrainian locale sidebar captured"
        expect: >
          Sidebar labels are in Ukrainian. Expected labels include:
          Рецензування (Reviews), Опитування (Surveys),
          Люди та доступ (People & Access), Безпека (Security),
          Ресурси групи (Group Resources), Налаштування (Settings)

      - action: evidence_capture
        params:
          label: "NAV-010-locale-ukrainian"
          include: [screenshot]
        assert: "Evidence captured"

    pass_criteria:
      - "Sidebar labels switch to Ukrainian after locale change"
      - "'Рецензування' or equivalent Ukrainian translation visible for Reviews"
      - "'Опитування' or equivalent visible for Surveys"
      - "'Люди та доступ' or equivalent visible for People & Access"
      - "No literal i18n keys (dot-separated strings like 'sidebar.reviews') visible"
    error_signatures:
      - pattern: "[a-z]+\\.[a-z]+(\\.[a-z]+)+"
        meaning: "Literal i18n key visible — missing Ukrainian translation"
      - pattern: "TypeError"
        meaning: "Crash during locale switch"

