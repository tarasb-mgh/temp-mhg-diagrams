        assert: "Russian locale selected"
        expect: "UI begins switching to Russian"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "text=Рецензирование, text=Обзоры"
          timeout: 5000
        assert: "Russian text appears in sidebar"

      - action: browser_snapshot
        params: {}
        assert: "Russian locale sidebar captured"
        expect: >
          Sidebar labels are in Russian. Expected labels include:
          Рецензирование (Reviews), Опросы (Surveys),
          Люди и доступ (People & Access), Безопасность (Security),
          Ресурсы группы (Group Resources), Настройки (Settings)

      - action: evidence_capture
        params:
          label: "NAV-011-locale-russian"
          include: [screenshot]
        assert: "Evidence captured"

      # Reset locale back to English for subsequent tests
      - action: browser_click
        params:
          selector: "[data-testid*='language' i], [data-testid*='locale' i], [class*='language' i], [aria-label*='language' i], select[name*='lang' i], [role='combobox']"
        assert: "Language selector re-opened to reset"

      - action: browser_select_option
        params:
          selector: "[data-testid*='language' i], [data-testid*='locale' i], select[name*='lang' i]"
          value: "en"
        assert: "English locale restored"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "text=Reviews, text=Dashboard"
          timeout: 5000
        assert: "English labels restored"

    pass_criteria:
      - "Sidebar labels switch to Russian after locale change"
      - "'Рецензирование' or equivalent Russian translation visible for Reviews"
      - "'Опросы' or equivalent visible for Surveys"
      - "'Люди и доступ' or equivalent visible for People & Access"
      - "No literal i18n keys visible"
      - "Locale successfully reset to English at end of test"
    error_signatures:
      - pattern: "[a-z]+\\.[a-z]+(\\.[a-z]+)+"
        meaning: "Literal i18n key visible — missing Russian translation"
      - pattern: "TypeError"
        meaning: "Crash during locale switch"

