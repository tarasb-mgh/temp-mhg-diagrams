      - "Tag management UI elements are visible (list, form, or empty-state with action)"
      - "No critical console errors"

    error_signatures:
      - pattern: "Cannot read properties of undefined"
        meaning: "Tag data not loaded — API may have returned empty or null"
      - pattern: "404.*/api/.*tag"
        meaning: "Tags API endpoint missing or route not registered"
      - pattern: "403"
        meaning: "Owner role lacks permission to manage review tags"

  # ---------------------------------------------------------------------------
  # RD-006: Review Configuration page loads
  # ---------------------------------------------------------------------------
  - id: RD-006
    title: "Review Configuration page loads"
    priority: P2
    tags: [review, configuration, settings]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner via AUTH-001"
    depends_on: [AUTH-001]

    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review/config"
