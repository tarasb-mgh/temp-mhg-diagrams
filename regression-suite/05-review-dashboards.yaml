# MHG Workbench Regression Suite — Module 05: Review Dashboards & Reports
# 6 tests | Role: owner | Depends on: AUTH-001

module:
  id: 05-review-dashboards
  title: "Review Dashboards & Reports"
  description: >
    Validates that all review dashboard pages, reports, escalations, tags, and
    configuration screens load correctly and render their expected content.
  test_count: 6
  default_role: owner
  default_viewport:
    width: 1280
    height: 800

tests:

  # ---------------------------------------------------------------------------
  # RD-001: Review Dashboard loads with personal stats
  # ---------------------------------------------------------------------------
  - id: RD-001
    title: "Review Dashboard loads with personal stats"
    priority: P1
    tags: [review, dashboard, stats]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner via AUTH-001"
      - "At least one completed review exists for the owner account"
    depends_on: [AUTH-001]

    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review/dashboard"
        assert: "Page begins loading without immediate redirect"

      - action: browser_wait_for
        params:
          selector: "[data-testid='review-dashboard'], .review-dashboard, main"
          timeout: 10000
        expect: "Dashboard container element is present in the DOM"

      - action: browser_snapshot
        params: {}
        assert: "Snapshot captured — dashboard page is fully rendered"

      - action: browser_snapshot
        params: {}
        assert: >
          Verify that a personal stats section is visible. Look for metric
          cards or summary elements showing data such as: reviews completed,
          average score, pending reviews, or similar stat indicators. At least
          one stat card or metric value must be visible.

      - action: browser_console_messages
        params: {}
        assert: >
          No unexpected console errors. Ignore patterns listed in
          _config.yaml known_acceptable_console.

      - action: evidence_capture
        params:
          label: "RD-001 Review Dashboard personal stats"
        assert: "Screenshot and DOM snapshot saved as evidence"

    pass_criteria:
      - "Dashboard page loads without HTTP 4xx/5xx errors"
      - "At least one personal stat metric card or summary element is visible"
      - "No critical console errors"

    error_signatures:
      - pattern: "Cannot read properties of undefined"
        meaning: "Stats data not loaded — API may have returned empty or null"
      - pattern: "404.*/api/.*dashboard"
        meaning: "Dashboard API endpoint missing or route not registered"
      - pattern: "403"
        meaning: "Owner role lacks permission to view dashboard"

  # ---------------------------------------------------------------------------
  # RD-002: Team Dashboard loads
  # ---------------------------------------------------------------------------
  - id: RD-002
    title: "Team Dashboard loads"
    priority: P1
    tags: [review, dashboard, team]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner via AUTH-001"
    depends_on: [AUTH-001]

    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review/team"
        assert: "Page begins loading without immediate redirect"

      - action: browser_wait_for
        params:
          selector: "[data-testid='team-dashboard'], .team-dashboard, main"
          timeout: 10000
        expect: "Team dashboard container element is present in the DOM"

      - action: browser_snapshot
        params: {}
        assert: "Snapshot captured — team dashboard page is fully rendered"

      - action: browser_snapshot
        params: {}
        assert: >
          Verify that a team stats section or team member table is visible.
          Look for elements showing reviewer names, team-level metrics,
          completion rates, or a data table with team information.

      - action: browser_console_messages
        params: {}
        assert: >
          No unexpected console errors. Ignore patterns listed in
          _config.yaml known_acceptable_console.

      - action: evidence_capture
        params:
          label: "RD-002 Team Dashboard"
        assert: "Screenshot and DOM snapshot saved as evidence"

    pass_criteria:
      - "Team dashboard page loads without HTTP 4xx/5xx errors"
      - "Team stats table or team metric section is visible"
      - "No critical console errors"

    error_signatures:
      - pattern: "Cannot read properties of undefined"
        meaning: "Team data not loaded — API may have returned empty or null"
      - pattern: "404.*/api/.*team"
        meaning: "Team dashboard API endpoint missing or route not registered"
      - pattern: "403"
        meaning: "Owner role lacks permission to view team dashboard"

  # ---------------------------------------------------------------------------
  # RD-003: Reports page loads
  # ---------------------------------------------------------------------------
  - id: RD-003
    title: "Reports page loads"
    priority: P2
    tags: [review, reports]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner via AUTH-001"
    depends_on: [AUTH-001]

    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review/reports"
        assert: "Page begins loading without immediate redirect"

      - action: browser_wait_for
        params:
          selector: "[data-testid='review-reports'], .review-reports, main"
          timeout: 10000
        expect: "Reports container element is present in the DOM"

      - action: browser_snapshot
        params: {}
        assert: "Snapshot captured — reports page is fully rendered"

      - action: browser_snapshot
        params: {}
        assert: >
          Verify the page renders without error. Confirm no error boundaries,
          blank white screens, or crash messages are displayed. The page should
          show report content, filters, or an empty-state placeholder.

      - action: browser_console_messages
        params: {}
        assert: >
          No unexpected console errors. Ignore patterns listed in
          _config.yaml known_acceptable_console.

      - action: evidence_capture
        params:
          label: "RD-003 Reports page"
        assert: "Screenshot and DOM snapshot saved as evidence"

    pass_criteria:
      - "Reports page loads without HTTP 4xx/5xx errors"
      - "Page renders meaningful content or an empty-state placeholder (no crash)"
      - "No critical console errors"

    error_signatures:
      - pattern: "Cannot read properties of undefined"
        meaning: "Report data not loaded — API may have returned empty or null"
      - pattern: "404.*/api/.*reports"
        meaning: "Reports API endpoint missing or route not registered"
      - pattern: "ChunkLoadError"
        meaning: "Code splitting failure — reports module not bundled correctly"

