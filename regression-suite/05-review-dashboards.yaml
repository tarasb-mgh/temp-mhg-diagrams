          timeout: 10000
        expect: "Escalations container element is present in the DOM"

      - action: browser_snapshot
        params: {}
        assert: "Snapshot captured — escalations page is fully rendered"

      - action: browser_snapshot
        params: {}
        assert: >
          Verify that an escalation list is visible, OR an empty-state message
          indicating no escalations exist. Either outcome is acceptable. Look
          for list items, table rows, or a message like "No escalations" or
          "No items to display".

      - action: browser_console_messages
        params: {}
        assert: >
          No unexpected console errors. Ignore patterns listed in
