        params:
          url: "${workbench_url}/workbench/review/tags"
        assert: "Page begins loading without immediate redirect"

      - action: browser_wait_for
        params:
          selector: "[data-testid='review-tags'], .review-tags, main"
          timeout: 10000
        expect: "Tags management container element is present in the DOM"

      - action: browser_snapshot
        params: {}
        assert: "Snapshot captured — review tags page is fully rendered"

      - action: browser_snapshot
        params: {}
        assert: >
          Verify that the tag management UI is visible. Look for elements such
          as: a list of existing tags, tag chips/badges, a create/add tag
          button, or a tag configuration form. An empty-state with an "Add Tag"
          action is also acceptable.

      - action: browser_console_messages
