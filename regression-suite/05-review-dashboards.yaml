      - "No critical console errors"

    error_signatures:
      - pattern: "Cannot read properties of undefined"
        meaning: "Escalation data not loaded — API may have returned empty or null"
      - pattern: "404.*/api/.*escalation"
        meaning: "Escalations API endpoint missing or route not registered"
      - pattern: "403"
        meaning: "Owner role lacks permission to view escalations"

  # ---------------------------------------------------------------------------
