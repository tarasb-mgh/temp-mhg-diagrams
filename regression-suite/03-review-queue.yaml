# MHG Workbench Regression Suite — Module 03: Review Queue
# 14 tests | Role: owner | Depends on: AUTH-001
# Validates review queue tabs, session cards, pagination, filtering, and sorting.

module:
  id: "03-review-queue"
  title: "Review Queue"
  description: "Verify the review queue loads correctly with all tabs, displays session cards, supports pagination, filtering, and sorting."
  role: owner
  depends_on: [AUTH-001]
  viewport: default

tests:

  # ──────────────────────────────────────────────────────────
  # RQ-001  Queue loads with all 7 tabs
  # ──────────────────────────────────────────────────────────
  - id: RQ-001
    title: "Queue loads with all 7 tabs"
    priority: P0
    tags: [review-queue, tabs, smoke]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner (AUTH-001 passed)"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review"
        assert: "Page loads without error"
      - action: browser_wait_for
        params:
          selector: "[role='tablist'], nav, .tabs, .MuiTabs-root"
          timeout: 10000
        assert: "Tab container is present in the DOM"
      - action: browser_snapshot
        params: {}
        expect: "Accessibility snapshot contains tab elements"
        extract:
          tab_labels: "All visible tab text values"
      - action: browser_take_screenshot
        params:
          filename: "rq-001-all-tabs.png"
        assert: "Screenshot captured for evidence"
      - action: evidence_capture
        params:
          description: "Verify 7 tabs are visible"
          check: "Tab labels include: Pending, Flagged, In Progress, Completed, Excluded, Supervision, Awaiting"
    pass_criteria:
      - "Page loads at /workbench/review without console errors"
      - "All 7 tabs are visible: Pending, Flagged, In Progress, Completed, Excluded, Supervision, Awaiting"
      - "One tab is active/selected by default"
    error_signatures:
      - pattern: "TypeError: Cannot read properties of undefined"
        meaning: "Tab data not loaded — API may have returned empty or undefined"
      - pattern: "status == 403"
        meaning: "Owner role lacks review queue permission"

  # ──────────────────────────────────────────────────────────
  # RQ-002  Pending tab shows session cards
  # ──────────────────────────────────────────────────────────
  - id: RQ-002
    title: "Pending tab shows session cards"
    priority: P0
    tags: [review-queue, session-cards, smoke]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner (AUTH-001 passed)"
      - "Review queue loaded (RQ-001 passed)"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review"
        assert: "Review queue page loads"
      - action: browser_wait_for
        params:
          selector: "[role='tablist'], nav, .tabs, .MuiTabs-root"
          timeout: 10000
        assert: "Tab container visible"
      - action: browser_snapshot
        params: {}
        expect: "Pending tab is active or selectable"
      - action: browser_click
        params:
          selector: "text=Pending"
        assert: "Pending tab clicked"
      - action: browser_wait_for
        params:
          selector: "[class*='card'], [class*='session'], [class*='list-item'], tr, li"
          timeout: 10000
        assert: "Session cards or list items appear"
      - action: browser_snapshot
        params: {}
        expect: "Session cards visible with message count indicators"
        extract:
          session_card_count: "Number of session cards/items visible"
          first_card_text: "Text content of the first session card"
      - action: browser_take_screenshot
        params:
          filename: "rq-002-pending-cards.png"
        assert: "Screenshot captured"
      - action: evidence_capture
        params:
          description: "Verify session cards with message counts"
          check: "At least one session card is visible; cards show a message count indicator"
    pass_criteria:
      - "Pending tab is active or becomes active on click"
      - "At least one session card is rendered"
      - "Session cards display a message count indicator (number badge or text)"
    error_signatures:
      - pattern: "status >= 500"
        meaning: "Backend failed to return pending sessions"
      - pattern: "TypeError: Cannot read properties of undefined"
        meaning: "Session list data is undefined — API response may be malformed"

  # ──────────────────────────────────────────────────────────
  # RQ-003  Session card click opens detail
  # ──────────────────────────────────────────────────────────
  - id: RQ-003
    title: "Session card click opens detail"
    priority: P0
    tags: [review-queue, session-detail, smoke]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner (AUTH-001 passed)"
      - "Pending tab shows at least one session card (RQ-002 passed)"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review"
        assert: "Review queue page loads"
      - action: browser_wait_for
        params:
          selector: "[class*='card'], [class*='session'], [class*='list-item'], tr, li"
          timeout: 10000
        assert: "Session cards are visible"
      - action: browser_snapshot
        params: {}
        expect: "At least one session card is present"
        extract:
          first_card_ref: "Reference to first clickable session card element"
      - action: browser_click
        params:
          selector: "[class*='card']:first-of-type, [class*='session']:first-of-type, tr:first-of-type, li:first-of-type"
        assert: "First session card clicked"
      - action: browser_wait_for
        params:
          selector: "[class*='message'], [class*='chat'], [class*='conversation'], [class*='detail']"
          timeout: 10000
        assert: "Session detail page loads with message content"
      - action: browser_snapshot
        params: {}
        expect: "Message list is rendered on the session detail page"
        extract:
          message_count: "Number of message elements visible"
          page_url: "Current URL after navigation"
      - action: browser_take_screenshot
        params:
          filename: "rq-003-session-detail.png"
        assert: "Screenshot captured"
      - action: browser_console_messages
        params: {}
        assert: "No critical console errors after navigation"
    pass_criteria:
      - "Clicking a session card navigates to a session detail page"
      - "URL changes to include a session identifier"
      - "Message list renders with at least one message"
      - "No critical console errors"
    error_signatures:
      - pattern: "status == 404 AND /api/"
        meaning: "Session detail endpoint not found — routing issue"
      - pattern: "TypeError: Cannot read properties of null"
        meaning: "Session data failed to load"

  # ──────────────────────────────────────────────────────────
  # RQ-004  Pagination loads more results
  # ──────────────────────────────────────────────────────────
  - id: RQ-004
    title: "Pagination loads more results"
    priority: P2
    tags: [review-queue, pagination]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner (AUTH-001 passed)"
      - "Review queue loaded with session cards"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review"
        assert: "Review queue page loads"
      - action: browser_wait_for
        params:
          selector: "[class*='card'], [class*='session'], [class*='list-item'], tr, li"
          timeout: 10000
        assert: "Session list visible"
      - action: browser_snapshot
        params: {}
        expect: "Check for pagination controls (next button, page numbers, load more, infinite scroll sentinel)"
        extract:
          has_pagination: "Whether pagination controls are visible"
          initial_items: "Count of visible session items"
      - action: browser_click
        params:
          selector: "[aria-label*='next'], [aria-label*='Next'], button:has-text('Next'), button:has-text('Load more'), [class*='pagination'] button:last-of-type"
        assert: "Pagination control clicked (skip if not found)"
      - action: browser_wait_for
        params:
          selector: "[class*='card'], [class*='session'], [class*='list-item'], tr, li"
          timeout: 10000
        assert: "New results load after pagination action"
      - action: browser_snapshot
        params: {}
        expect: "New or additional session items are visible"
        extract:
          post_pagination_items: "Count of visible session items after pagination"
      - action: browser_take_screenshot
        params:
          filename: "rq-004-pagination.png"
        assert: "Screenshot captured"
    pass_criteria:
      - "Pagination controls are present (or test notes their absence)"
      - "Clicking next/load-more loads additional or different results"
      - "No console errors during pagination"
    error_signatures:
      - pattern: "status >= 500"
        meaning: "Backend pagination query failed"

