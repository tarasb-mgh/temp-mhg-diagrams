        assert: "Queue loaded"
      - action: browser_snapshot
        params: {}
        expect: "Look for risk level filter — dropdown, select, or button group"
        extract:
          risk_filter_ref: "Reference to risk level filter element"
      - action: browser_click
        params:
          selector: "[aria-label*='risk' i], [data-testid*='risk' i], select[name*='risk' i], [class*='risk-filter'], [placeholder*='risk' i]"
        assert: "Risk level filter control clicked or opened"
      - action: browser_snapshot
        params: {}
        expect: "Risk level options are visible (e.g., Low, Medium, High, Critical)"
        extract:
          risk_options: "Available risk level option values"
      - action: browser_click
        params:
          selector: "[role='option']:first-of-type, li:first-of-type, [data-value]:first-of-type"
        assert: "A risk level option selected"
      - action: browser_wait_for
        params:
          selector: "[class*='card'], [class*='session'], [class*='list-item'], tr, li"
          timeout: 10000
        assert: "Queue updates with filtered results"
      - action: browser_snapshot
        params: {}
        expect: "Session list is filtered — count or content changed"
        extract:
          filtered_count: "Number of sessions after filter"
      - action: browser_take_screenshot
        params:
          filename: "rq-005-risk-filter.png"
        assert: "Screenshot captured"
    pass_criteria:
      - "Risk level filter is present and interactive"
      - "Selecting a risk level refreshes the queue"
      - "Filtered results reflect the selected risk level"
    error_signatures:
      - pattern: "status >= 500"
        meaning: "Backend filter query failed"
      - pattern: "TypeError: Cannot read properties of undefined"
        meaning: "Filter component received undefined options"

