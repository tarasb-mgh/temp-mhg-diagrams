        assert: "OTP entered"

      - action: browser_click
        params:
          selector: "button:has-text('Verify'), button:has-text('Submit'), button[type='submit']"
        assert: "OTP submitted"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[data-testid='dashboard'], nav, aside, [class*='sidebar' i]"
          timeout: 10000
        assert: "Dashboard loaded for moderator"

      - action: browser_snapshot
        params: {}
        assert: "Moderator sidebar captured"
        expect: >
          Moderator sees Reviews and People & Access groups in the sidebar
          but does NOT see the Security group

      - action: evidence_capture
        params:
          label: "AUTH-010-moderator-sidebar"
          include: [screenshot]
        assert: "Evidence captured"

    pass_criteria:
      - "Reviews group is visible in sidebar"
      - "People & Access group is visible in sidebar"
      - "Security group is NOT visible in sidebar"
    error_signatures:
      - pattern: "403.*api/permissions"
        meaning: "Permission fetch failed for moderator role"
      - pattern: "Security"
        meaning: "Security section visible to moderator — RBAC violation"

  # ---------------------------------------------------------------------------
  # AUTH-011  Permission-denied redirect on direct URL
  # ---------------------------------------------------------------------------
  - id: AUTH-011
    title: "Permission-denied redirect on direct URL"
    priority: P2
    tags: [auth, rbac, redirect, negative]
    role: user
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "e2e-user@test.local account exists with 'user' role"
      - "User role does NOT have access to /workbench/review"
    depends_on: []
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}"
        assert: "Login page loaded"

      - action: browser_click
        params:
          selector: "button:has-text('Sign In to Start'), button:has-text('Sign in to Start')"
        assert: "Sign-in expanded"

      - action: browser_fill_form
        params:
          selector: "input[type='email'], input[name='email'], input[placeholder*='email' i]"
          value: "${account.user.email}"
        assert: "User email entered"

      - action: browser_click
        params:
          selector: "button:has-text('Send Code'), button:has-text('Send code'), button[type='submit']"
        assert: "OTP requested"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "input[name='otp'], input[aria-label*='code' i], input[placeholder*='code' i], input[type='tel']"
          timeout: 8000
        assert: "OTP input visible"

      - action: browser_console_messages
        params: {}
        extract:
          variable: otp_code
          pattern: "Code:\\s+(\\d{6})"
          group: 1

      - action: browser_fill_form
        params:
          selector: "input[name='otp'], input[aria-label*='code' i], input[placeholder*='code' i], input[type='tel']"
          value: "${otp_code}"
        assert: "OTP entered"

      - action: browser_click
        params:
          selector: "button:has-text('Verify'), button:has-text('Submit'), button[type='submit']"
        assert: "OTP submitted"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i], [class*='denied' i], *:has-text('not authorized')"
          timeout: 10000
        assert: "Post-login state reached"

      - action: browser_navigate
        params:
          url: "${workbench_url}/review"
        assert: "Directly navigating to /review as regular user"
        expect: "User should be redirected or see access denied"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='denied' i], [class*='unauthorized' i], *:has-text('not authorized'), *:has-text('access denied'), *:has-text('permission')"
          timeout: 10000
        assert: "Access denied or redirect detected"
        expect: "User is redirected away from /review or shown permission error"

      - action: browser_snapshot
        params: {}
        assert: "Permission denied state captured"
        expect: "User does NOT see the review queue content"

      - action: evidence_capture
        params:
          label: "AUTH-011-direct-url-denied"
          include: [screenshot, console, network]
        assert: "Evidence captured"

    pass_criteria:
      - "Navigating directly to /review as a regular user results in redirect or access-denied message"
      - "Review queue content is NOT displayed"
    error_signatures:
      - pattern: "403"
        meaning: "Expected — backend correctly denying review access for user role"
      - pattern: "TypeError"
        meaning: "Permission guard crash on direct URL access"
