defects:
  - id: D-1
    title: "Dashboard 'Pending Review' counter does not match Queue Pending tab count"
    severity: medium
    related_tests: [RQ-002, RQ-003]
    symptom: "Dashboard shows Pending Review = 91; Review Queue Pending tab = 0."
    root_cause: "Queue API filters by selected Space (groupId param); Dashboard counter does not."
    network_evidence: "GET /api/review/queue?page=1&groupId=ba1ced2d-e827-4a2e-8d16-94fc3085962e&tab=pending → 200, 0 results"
    user_impact: "Reviewer follows the 91-counter to an empty queue and is confused."
    fix_options:
      - "Make Dashboard tile respect active Space selection."
      - "Label as 'Pending Review (All Spaces)' with per-space breakdown."
      - "Auto-switch Space to All Spaces when navigating from Dashboard tile."

  - id: D-2
    title: "Broken sessions are reachable from Reviewer In Progress tab"
    severity: high
    related_tests: [RQ-002, RQ-003]
    symptom: "Both sessions in In Progress tab carry Broken badge with tooltip 'no assistant replies — surfaced by mistake'."
    user_impact: "Reviewer opens a broken session, can't complete review, has to navigate back."
    fix: "Exclude Broken/surfaced-by-mistake sessions from the queue, or gate them behind an explicit filter."

  - id: D-3
    title: "Broken-session tooltip contradicts actual session content"
    severity: medium
    related_tests: [RQ-003, RS-001]
    symptom: "Tooltip claims 'no assistant replies'; opening session be2dc550-... shows 8 assistant messages."
    user_impact: "Mistrust in broken-session detection logic."
    fix: "Audit the broken-session detection criteria and align tooltip wording with actual catch logic."

