        assert: "Screenshot captured"
    pass_criteria:
      - "Back button or breadcrumb is present on the session detail page"
      - "Clicking it returns to the review queue"
      - "Review queue renders correctly with tabs visible"
      - "URL matches the review queue path"
    error_signatures:
      - pattern: "TypeError: Cannot read properties of undefined"
        meaning: "Navigation state lost during back navigation"

  # ──────────────────────────────────────────────────────────
  # RS-010  Anonymized/blinded indicator
  # ──────────────────────────────────────────────────────────
  - id: RS-010
    title: "Anonymized/blinded indicator visible"
    priority: P2
    tags: [review-session, anonymization, privacy]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner (AUTH-001 passed)"
      - "Session detail shows messages (RS-001 passed)"
    depends_on: [RS-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review"
        assert: "Review queue page loads"
      - action: browser_wait_for
