          selector: "[class*='card']:first-of-type, [class*='session']:first-of-type, tr:first-of-type, li:first-of-type"
        assert: "First session card clicked"
      - action: browser_wait_for
        params:
          selector: "[class*='message'], [class*='chat'], [class*='conversation'], [class*='detail']"
          timeout: 10000
        assert: "Session detail page loads"
      - action: browser_snapshot
        params: {}
        expect: "Look for anonymization/blinding indicator — badge, icon, label, or banner showing the session is anonymized"
        extract:
          anonymization_indicator: "Text or element indicating anonymization status"
          user_identity_visible: "Whether real user identity (name, email) is visible or masked"
      - action: browser_take_screenshot
        params:
          filename: "rs-010-anonymized-indicator.png"
        assert: "Screenshot captured"
      - action: evidence_capture
        params:
          description: "Verify anonymization indicator is present"
          check: "Session detail shows an anonymization badge, label, or icon. User identity is masked or replaced with a pseudonym."
    pass_criteria:
      - "Session detail displays an anonymization/blinding indicator"
      - "Real user identity (name, email) is not exposed to the reviewer"
      - "Indicator is clearly visible (badge, icon, or label)"
    error_signatures:
      - pattern: "TypeError: Cannot read properties of undefined"
        meaning: "Anonymization state not loaded"
