        expect: "Locate back button, breadcrumb link, or navigation element to return to queue"
        extract:
          back_element_ref: "Reference to back button or breadcrumb"
      - action: browser_click
        params:
          selector: "[aria-label*='back' i], [data-testid*='back' i], button:has-text('Back'), a:has-text('Back'), [class*='breadcrumb'] a:first-of-type, [class*='back-button'], nav [href*='review']"
        assert: "Back button or breadcrumb clicked"
      - action: browser_wait_for
        params:
