      - action: browser_snapshot
        params: {}
        expect: "Locate comment or notes textarea on the page"
        extract:
          textarea_ref: "Reference to comment/notes textarea element"
      - action: browser_fill_form
        params:
          selector: "textarea[name*='comment' i], textarea[placeholder*='comment' i], textarea[name*='note' i], textarea[placeholder*='note' i], textarea[class*='comment'], textarea[class*='review-note'], textarea"
          value: "Test input for RS-007 — verifying textarea accepts text"
        assert: "Text entered in comment textarea"
      - action: browser_snapshot
        params: {}
        expect: "Typed text is visible in the textarea"
        extract:
          textarea_value: "Current value of the textarea"
      - action: browser_take_screenshot
        params:
          filename: "rs-007-comment-textarea.png"
        assert: "Screenshot captured"
    pass_criteria:
      - "Comment/notes textarea is present on the session detail page"
      - "Textarea accepts text input"
      - "Entered text is visible in the field"
    error_signatures:
      - pattern: "TypeError: Cannot read properties of undefined"
        meaning: "Textarea component not rendered — missing form data"

