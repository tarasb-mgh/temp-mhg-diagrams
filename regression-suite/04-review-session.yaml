        assert: "Tags input clicked or focused"
      - action: browser_snapshot
        params: {}
        expect: "Tag suggestions or autocomplete dropdown visible"
        extract:
          tag_suggestions: "Available tag suggestion values"
      - action: browser_take_screenshot
        params:
          filename: "rs-008-tags-combobox.png"
        assert: "Screenshot captured"
    pass_criteria:
      - "Tags input/combobox is present on the session detail page"
      - "Clicking the input shows suggestions or allows freeform entry"
      - "No console errors during interaction"
    error_signatures:
      - pattern: "TypeError: Cannot read properties of undefined"
        meaning: "Tags component received undefined data"
      - pattern: "status >= 500"
        meaning: "Backend failed to load tag options"

  # ──────────────────────────────────────────────────────────
  # RS-009  Back button returns to queue
  # ──────────────────────────────────────────────────────────
