    title: "Back button returns to queue"
    priority: P1
    tags: [review-session, navigation, back]
    role: owner
    viewport: default
    prerequisites:
      - "Authenticated as owner (AUTH-001 passed)"
      - "Session detail shows messages (RS-001 passed)"
    depends_on: [RS-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/review"
        assert: "Review queue page loads"
      - action: browser_wait_for
        params:
          selector: "[class*='card'], [class*='session'], [class*='list-item'], tr, li"
          timeout: 10000
        assert: "Session cards visible"
      - action: browser_click
        params:
          selector: "[class*='card']:first-of-type, [class*='session']:first-of-type, tr:first-of-type, li:first-of-type"
        assert: "First session card clicked"
      - action: browser_wait_for
        params:
