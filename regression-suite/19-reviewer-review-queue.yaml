# Reviewer Review Queue — AI-runnable regression module (feature 058)
#
# Jira Epic: MTB-1449
# Spec: specs/058-reviewer-review-queue/spec.md
# Plan: specs/058-reviewer-review-queue/plan.md
# Tasks: specs/058-reviewer-review-queue/tasks.md
#
# This module exercises the Reviewer Review Queue surface via the
# Playwright MCP harness. It is scoped to the `e2e-researcher@test.local`
# fixture (role `Researcher`) and runs against the dev environment by
# default (`workbench.dev.mentalhelp.chat` + `api.dev.mentalhelp.chat`).
#
# Coverage added in this revision (US-1 foundation + US-2 + US-3):
#   RQ-001..RQ-018. Remaining groups (US-4..US-8 + polish) remain
#   planned stubs — new cases will be appended per US PR.

module:
  id: "19-reviewer-review-queue"
  title: "Reviewer Review Queue (feature 058)"
  jira_epic: "MTB-1449"
  owning_spec: "specs/058-reviewer-review-queue/spec.md"
  description: >-
    End-to-end validation of the Reviewer / Researcher experience inside
    MHG Workbench: Space-driven Review Queue, structured rating editor,
    per-message clinical tags + Red Flag, autosave + offline mode +
    multi-tab reconciliation, change-request workflow, Space-scoped
    Reports, WCAG 2.1 AA compliance, server-side PII masking, audit
    trail. Mirrors the CI-runnable Playwright specs in
    `chat-ui/tests/reviewer-review-queue/`.
  default_account: "researcher"

# Planned test-case groups (per user story from spec.md). Each group
# will receive concrete test cases in the corresponding US PR.
planned_groups:
  - us: US-1
    priority_range: [P0, P1]
    description: "Reviewer rates a brand-new session end-to-end (MVP happy path)."
    expected_cases: 14
    jira_story: "MTB-1450"
    status: "cases RQ-001..RQ-014 added"
  - us: US-2
    priority_range: [P0, P1]
    description: >-
      Autosave on blur + page-unload, offline mode with banner +
      IndexedDB queue, Submit countdown, multi-tab focus-fetch
      reconciliation. Foundation shipped: RQ-015..RQ-016 cover
      offline → enqueue → replay for the per-message tag comment
      surface + liveness-check polling; remaining cases will cover
      ratings / tags / red flags wiring, beforeunload guard, and
      multi-tab reconciliation in follow-up PRs.
    expected_cases: 10
    jira_story: "MTB-1451"
    status: "cases RQ-015..RQ-016 added"
  - us: US-3
    priority_range: [P0, P1]
    description: >-
      Clinical tags, per-message tag comments, Red Flag flow, Expert
      fan-out. Shipped: RQ-017..RQ-018 cover FR-022
      per-(message, reviewer) tag comment (render + blur-save +
      clear-to-delete). Remaining cases will cover Red Flag flow
      and Expert fan-out in follow-up PRs.
    expected_cases: 10
    jira_story: "MTB-1452"
    status: "cases RQ-017..RQ-018 added"
  - us: US-4
    priority_range: [P1, P2]
    description: "Change-request + Supervisor decision + REPEAT label + canonical/superseded."
    expected_cases: 7
    jira_story: "MTB-1453"
  - us: US-5
    priority_range: [P1, P2]
    description: "Reports Reviewer-scoped only; performer filter not in DOM."
    expected_cases: 5
    jira_story: "MTB-1454"
  - us: US-6
    priority_range: [P0, P1]
    description: "Two-Reviewer cross-isolation (UI + direct API)."
    expected_cases: 5
    jira_story: "MTB-1455"
  - us: US-7
    priority_range: [P1, P2]
    description: "Minimal sidebar, 2FA gate (dev OTP vs prod TOTP), timeout preserves draft."
    expected_cases: 5
    jira_story: "MTB-1456"
  - us: US-8
    priority_range: [P2, P3]
    description: "Audit emissions coverage per event type."
    expected_cases: 8
    jira_story: "MTB-1457"

# Cross-cutting planned gates (added in the Polish phase)
planned_gates:
  - id: A11Y
    description: "axe-core zero critical / zero serious across Reviewer routes (SC-013g)."
  - id: PII
    description: "Zero unmasked PII in DOM / network / console / traces (SC-013p)."
  - id: PERF
    description: "TTI / autosave P95 / focus-fetch P95 / bundle / Core Web Vitals budgets (SC-013o)."
  - id: PWA
    description: "Manifest + service worker + Lighthouse PWA score ≥ 90 (SC-013m)."
  - id: RESPONSIVE
    description: "Desktop / tablet / mobile viewport parity (SC-013l)."
  - id: BROWSER
    description: "Chromium + WebKit Playwright projects green (SC-013n)."

tests:
  - id: RQ-001
    priority: P0
    story: US-1
    jira: MTB-1450
    title: "Reviewer can sign in via email OTP (dev) and land on Review Queue"
    requirement_refs: [FR-004, FR-006]
    steps:
      - action: browser_navigate
        url: "https://workbench.dev.mentalhelp.chat/"
      - action: browser_click
        element: "Sign In to Start button"
      - action: browser_fill_form
        fields:
          - name: email
            type: textbox
            value: "e2e-researcher@test.local"
      - action: browser_click
        element: "Send Code button"
      - action: extract_otp_from_console
        pattern: 'Code:\s+(\d{6})'
        timeout_ms: 8000
      - action: browser_fill_form
        fields:
          - name: otp
            type: textbox
            value: "{extracted_otp}"
      - action: browser_click
        element: "Verify button"
    assertions:
      - url_matches: "^https://workbench\\.dev\\.mentalhelp\\.chat/workbench"
      - snapshot_contains_text: "E2e-Researcher"
      - snapshot_contains_text: "Researcher"
      - no_console_errors_except: ["api/auth/refresh.*401"]

  - id: RQ-002
    priority: P0
    story: US-1
    jira: MTB-1450
    title: "Review Queue page exposes Pending + Completed tabs with counts"
    requirement_refs: [FR-006, FR-008]
    depends_on: [RQ-001]
    steps:
      - action: browser_click
        element: "Review Queue sidebar item"
      - action: browser_snapshot
    assertions:
      - url_matches: "^https://workbench\\.dev\\.mentalhelp\\.chat/workbench/review$"
      - snapshot_has_tablist: "Review queue tabs"
      - snapshot_has_tab_with_count: "Pending"
      - snapshot_has_tab_with_count: "Completed"
      - snapshot_shows_pagination: true

  - id: RQ-003
    priority: P0
    story: US-1
    jira: MTB-1450
    title: "Session detail view shows transcript, rating panel, and progress gate"
    requirement_refs: [FR-008, FR-011, FR-018]
    depends_on: [RQ-002]
    steps:
      - action: browser_click
        element: "First review session card"
      - action: browser_snapshot
    assertions:
      - snapshot_contains_text: "Review Session"
      - snapshot_contains_text: "Transcript"
      - snapshot_contains_text: "Your Rating"
      - snapshot_contains_text: "Rate all messages to submit"
      - snapshot_contains_text: "Blinded"
      - snapshot_has_radiogroup_aria_label: "Select a score from 1 to 10"
      - snapshot_has_button_disabled: "Submit Review"

  - id: RQ-004
    priority: P1
    story: US-1
    jira: MTB-1450
    title: "Scoring < 8 reveals mandatory criterion + comment + validated answer"
    requirement_refs: [FR-014, FR-015, FR-017]
    depends_on: [RQ-003]
    steps:
      - action: browser_click
        element: "Score 5 radio"
    assertions:
      - snapshot_contains_text: "Criteria Feedback"
      - snapshot_contains_text: "Required"
      - snapshot_contains_text: "Relevance"
      - snapshot_contains_text: "Empathy"
      - snapshot_contains_text: "Safety"
      - snapshot_contains_text: "Ethics"
      - snapshot_contains_text: "Clarity"
      - snapshot_contains_text: "Request Match"
      - snapshot_contains_text: "Autonomy Support"
      - snapshot_contains_text: "Artificiality"
      - snapshot_contains_text: "Correct Answer"
      - snapshot_contains_text: "Comment is required for scores below 8"
      - snapshot_contains_text: "A correct answer is required for scores below 8"

  - id: RQ-005
    priority: P1
    story: US-1
    jira: MTB-1450
    title: "Scoring >= 8 leaves criterion + correct-answer fields optional"
    requirement_refs: [FR-016]
    depends_on: [RQ-003]
    steps:
      - action: browser_click
        element: "Score 9 radio"
    assertions:
      - snapshot_does_not_contain_text: "A correct answer is required for scores below 8"
      - snapshot_does_not_contain_text: "Comment is required for scores below 8"
      - snapshot_has_button_disabled: "Submit Review"
        reason: "Other messages remain unrated"

  - id: RQ-006
    priority: P1
    story: US-1
    jira: MTB-1450
    title: "Score radios expose per-level tooltips via info icons"
    requirement_refs: [FR-012]
    depends_on: [RQ-003]
    steps:
      - action: browser_hover
        element: "Show grade description for level 9 info icon"
    assertions:
      - snapshot_tooltip_contains: "Score level: 9"
      - snapshot_tooltip_contains: "Above Average"

  - id: RQ-007
    priority: P1
    story: US-1
    jira: MTB-1450
    title: "Every message surfaces a Clinical tag and a Red Flag control"
    requirement_refs: [FR-020, FR-025]
    depends_on: [RQ-003]
    steps:
      - action: browser_snapshot
    assertions:
      - snapshot_count_buttons_by_label: "Clinical tag"
        min: 1
      - snapshot_count_buttons_by_label: "Red Flag"
        min: 1
      - snapshot_contains_text: "Risk Flag"
        scope: header

  - id: RQ-008
    priority: P0
    story: US-1
    jira: MTB-1450
    title: "After all assistant messages are rated with >= 8, Submit enables and completes"
    requirement_refs: [FR-018, FR-019, FR-035]
    depends_on: [RQ-003]
    steps:
      - action: iterate_assistant_messages
        for_each:
          - action: click_rate_this_assistant_message
          - action: click_score_radio
            value: 9
          - action: wait
            ms: 300
      - action: browser_click
        element: "Submit Review button"
      - action: browser_wait_for
        text: "Review submitted"
        timeout_ms: 5000
    assertions:
      - network_request_succeeded: "POST /api/review/sessions/.+/submit"
        status: 200
      - navigation_returned_to: "^https://workbench\\.dev\\.mentalhelp\\.chat/workbench/review"
      - tab_badge_incremented: "Completed"
      - no_console_errors_except: ["api/auth/refresh.*401"]

  - id: RQ-009
    priority: P0
    story: US-1
    jira: MTB-1450
    title: "GET /api/health/ping responds 200 without authentication (FR-031a)"
    requirement_refs: [FR-031a]
    steps:
      - action: http_request
        method: GET
        url: "https://api.dev.mentalhelp.chat/api/health/ping"
        headers: {}
    assertions:
      - response_status: 200
      - response_header: "Cache-Control"
        equals: "no-store"
      - response_body_matches:
          ok: true
          serverTime: { type: string, iso8601: true }
      - latency_p95_ms_below: 100

  - id: RQ-010
    priority: P0
    story: US-1
    jira: MTB-1450
    title: "GET /api/spaces/me returns only the Reviewer's active Spaces (FR-010a)"
    requirement_refs: [FR-010a]
    depends_on: [RQ-001]
    steps:
      - action: extract_access_token_from_local_storage
        key: accessToken
      - action: http_request
        method: GET
        url: "https://api.workbench.dev.mentalhelp.chat/api/spaces/me"
        headers:
          Authorization: "Bearer {accessToken}"
    assertions:
      - response_status: 200
      - response_body_matches:
          success: true
          data:
            spaces:
              type: array
      - response_body_all_items_have:
          path: "data.spaces[]"
          fields: [id, name]
      - negative_case:
          without_auth_header: true
          expected_status: 401

  - id: RQ-011
    priority: P0
    story: US-1
    jira: MTB-1450
    title: "Red Flag modal blocks empty description + accepts non-PII text (FR-026)"
    requirement_refs: [FR-026, FR-025, FR-047c]
    depends_on: [RQ-004]
    description: >-
      Validates the three core Red Flag modal behaviours on dev:
      (1) opening via the per-message Red Flag button renders a dialog
          with a required Description textarea, a visible character
          minimum indicator, and a Confirm Red Flag button;
      (2) clicking Confirm with an empty description keeps the dialog
          open (client-side gating);
      (3) clicking Confirm with a safe (non-PII) description submits
          POST /api/review/sessions/{id}/red-flags, dismisses the
          dialog, and renders a `Red Flag` pill on the targeted message
          that survives a full-page reload.
    steps:
      - action: navigate_to_first_pending_session
      - action: click_red_flag_button_on_first_user_message
      - action: expect_dialog_visible
        role: dialog
        name: "Red Flag"
      - action: assert_dialog_has_textarea
        label: "Description"
        required: true
      - action: click_button_in_dialog
        name: "Confirm Red Flag"
      - action: expect_dialog_still_visible
      - action: fill_dialog_textarea
        label: "Description"
        value: "critical situation detected by automated regression"
      - action: click_button_in_dialog
        name: "Confirm Red Flag"
      - action: expect_no_dialog
      - action: expect_element_on_message
        message_index: 0
        role: user
        contains_text: "Red Flag"
      - action: reload_page
      - action: expect_element_on_message
        message_index: 0
        role: user
        contains_text: "Red Flag"
    assertions:
      - network_post_succeeded:
          url_suffix: "/red-flags"
          expected_status_range: [200, 299]
      - console_errors: []
      - known_flake: false

  - id: RQ-012
    priority: P1
    story: US-1
    jira: MTB-1450
    title: "GET /api/reviewer/queue/languages returns options envelope (FR-009c)"
    requirement_refs: [FR-009c, FR-021a]
    depends_on: [RQ-001]
    description: >-
      Smoke-test the 058 language-filter endpoint. Verifies the
      envelope shape, that unknown `tab` values collapse to the
      default, and that a missing auth header yields 401. Does not
      assert non-empty options because dev fixture sessions do not
      always have `sessions.language` populated — option content is
      covered by integration tests in chat-backend.
    steps:
      - action: extract_access_token_from_local_storage
        key: accessToken
      - action: http_request
        method: GET
        url: "https://api.workbench.dev.mentalhelp.chat/api/reviewer/queue/languages"
        headers:
          Authorization: "Bearer {accessToken}"
      - action: http_request
        method: GET
        url: "https://api.workbench.dev.mentalhelp.chat/api/reviewer/queue/languages?tab=completed"
        headers:
          Authorization: "Bearer {accessToken}"
      - action: http_request
        method: GET
        url: "https://api.workbench.dev.mentalhelp.chat/api/reviewer/queue/languages?tab=bogus"
        headers:
          Authorization: "Bearer {accessToken}"
    assertions:
      - response_status: 200
      - response_body_matches:
          success: true
          data:
            options:
              type: array
      - response_body_all_items_have:
          path: "data.options[]"
          fields: [code, count]
      - negative_case:
          without_auth_header: true
          expected_status: 401

  - id: RQ-013
    priority: P0
    story: US-1
    jira: MTB-1450
    title: "Pending sub-status chip bar (new/unfinished/repeat) filters the queue (FR-009a)"
    requirement_refs: [FR-009a, FR-009b]
    depends_on: [RQ-001]
    description: >-
      End-to-end validation of the FR-009a multi-select chip bar on the
      Pending tab. Exercises:
      (1) chip bar renders with three chips (New / Unfinished / Repeat),
          all `role="switch"` with `aria-checked="false"` initially and
          a `role="group"` wrapper with an accessible name;
      (2) toggling a single chip issues
          `GET /api/review/queue?tab=pending&subStatus=<value>`;
      (3) multi-select emits the OR union
          `GET /api/review/queue?tab=pending&subStatus=<a>,<b>`;
      (4) Clear button empties the selection, restores the default
          semantics, removes the Filters-active badge.
      Implicitly covers FR-009b (page size 25 is now the default; the
      UI constant `PAGE_SIZE` was bumped to match).
    steps:
      - action: navigate
        url: "https://workbench.dev.mentalhelp.chat/workbench/review"
      - action: assert_element_exists
        testid: "pending-sub-status-chip-new"
      - action: assert_element_exists
        testid: "pending-sub-status-chip-unfinished"
      - action: assert_element_exists
        testid: "pending-sub-status-chip-repeat"
      - action: assert_aria_checked
        testid: "pending-sub-status-chip-new"
        value: "false"
      - action: click
        testid: "pending-sub-status-chip-unfinished"
      - action: assert_aria_checked
        testid: "pending-sub-status-chip-unfinished"
        value: "true"
      - action: assert_network_request_happened
        url_contains: "/api/review/queue"
        query_contains: "subStatus=unfinished"
      - action: click
        testid: "pending-sub-status-chip-new"
      - action: assert_network_request_happened
        url_contains: "/api/review/queue"
        query_contains: "subStatus=unfinished%2Cnew"
      - action: click
        testid: "pending-sub-status-clear"
      - action: assert_aria_checked_all
        testids:
          - "pending-sub-status-chip-new"
          - "pending-sub-status-chip-unfinished"
          - "pending-sub-status-chip-repeat"
        value: "false"
    assertions:
      - console_errors_excluding:
          url_prefix_allow:
            - "https://api.workbench.dev.mentalhelp.chat/api/auth/me"  # pre-login 401
      - network_response_status_range: [200, 299]

  - id: RQ-014
    priority: P1
    story: US-1
    jira: MTB-1450
    title: "Language chip bar hides when no locales present; renders chips when populated (FR-009c)"
    requirement_refs: [FR-009c, FR-009b]
    depends_on: [RQ-001]
    description: >-
      Validates that the FR-009c language chip bar component
      (`queue-language-chips`) behaves correctly in both states:
      (1) when the endpoint returns an empty `options` list for the
          active queue window, the component renders nothing (no chip
          bar, no empty card-chrome, no label);
      (2) when the endpoint returns ≥1 locale, one chip per locale is
          rendered with a count bubble; chips share the a11y contract
          (`role="switch"` + `aria-checked`).
      In dev today every session has `language=null`, so only the
      hidden-on-empty path is exercised live. The populated path is
      covered by chat-backend integration tests + the
      `QueueLanguageChips` unit tests in workbench-frontend.
    steps:
      - action: navigate
        url: "https://workbench.dev.mentalhelp.chat/workbench/review"
      - action: assert_element_absent
        testid: "queue-language-chips"
      - action: assert_network_request_happened
        url: "/api/reviewer/queue/languages?tab=pending"
        expected_status: 200
        expected_response_body_path: "data.options"
        expected_response_body_shape: "array"
    assertions:
      - frontend_unit_tests_link: "workbench-frontend/src/features/workbench/review/components/__tests__/QueueLanguageChips.test.tsx"
      - backend_integration_tests_link: "chat-backend/tests/integration/reviewer-queue.languages.test.ts"

  - id: RQ-015
    priority: P0
    story: US-2
    jira: MTB-1451
    title: "Offline banner appears when navigator.onLine flips false; queue + replay drain the op (FR-031..FR-033)"
    requirement_refs: [FR-031, FR-031a, FR-032, FR-033, FR-034]
    depends_on: [RQ-017]
    description: >-
      Full offline / replay cycle on dev. Exercises:
      (1) firing a window `offline` event flips the useBackendLiveness
          hook's `online` state to false → the OfflineBanner renders
          with amber styling, `role="status"`, `aria-live="polite"`,
          and a Retry button;
      (2) typing text into a `<MessageTagComment>` + blurring while
          offline enqueues an `OfflineOp` in IndexedDB (store `ops`,
          kind `reviewer.messageTagComment.upsert`) — NO PUT fires;
      (3) the banner count updates to "1 change queued locally";
      (4) when the next `/api/health/ping` confirms the backend is
          reachable again, `online` flips true, `replayOfflineOps`
          runs the dispatcher, and the queued op is drained (row
          removed from IDB);
      (5) the terminal state on the server reflects the queued comment
          — `GET /message-tag-comments` returns the text that was
          typed while offline.
    steps:
      - action: navigate_to_session_with_clinical_tags
      - action: dispatch_window_event
        event: offline
      - action: wait_ms
        value: 1500
      - action: assert_element_exists
        testid: offline-banner
      - action: assert_text_matches
        testid: offline-banner
        contains: "offline"
      - action: type_in_message_tag_comment
        text: "offline queued note"
      - action: assert_indexeddb_queue_length
        db: mhg-reviewer-offline
        store: ops
        expected_length: 1
      - action: assert_indexeddb_last_op
        kind: reviewer.messageTagComment.upsert
        payload_fields: [sessionId, messageId, comment]
      - action: wait_until_online_true
        timeout_ms: 30000
      - action: assert_indexeddb_queue_length
        db: mhg-reviewer-offline
        store: ops
        expected_length: 0
      - action: extract_access_token_from_local_storage
        key: accessToken
      - action: http_request
        method: GET
        url: "https://api.workbench.dev.mentalhelp.chat/api/review/sessions/{sessionId}/message-tag-comments"
        headers:
          Authorization: "Bearer {accessToken}"
    assertions:
      - response_status: 200
      - response_body_matches:
          success: true
          data:
            comments:
              contains:
                comment: "offline queued note"
      - console_errors: []

  - id: RQ-016
    priority: P1
    story: US-2
    jira: MTB-1451
    title: "GET /api/health/ping is polled every 15 s and never returns cached results (FR-031a)"
    requirement_refs: [FR-031a]
    depends_on: [RQ-001]
    description: >-
      Smoke-test the liveness-check polling loop. Confirms that:
      (1) the endpoint is reachable unauthenticated AND authenticated
          (both return 200 with the payload `{ ok: true, serverTime }`);
      (2) response carries `Cache-Control: no-store` (so the ping is
          NEVER served from a CDN / worker cache);
      (3) the frontend polls it at startup + every 15 s (tracked by
          counting calls in the network request log after sitting on
          the Review Session view for 35 s — expect ≥ 3 ping calls).
    steps:
      - action: http_request
        method: GET
        url: "https://api.workbench.dev.mentalhelp.chat/api/health/ping"
      - action: http_request
        method: GET
        url: "https://api.workbench.dev.mentalhelp.chat/api/health/ping"
        headers:
          Authorization: "Bearer {accessToken}"
      - action: navigate_to_session_with_clinical_tags
      - action: wait_ms
        value: 35000
      - action: count_network_requests
        url_contains: "/api/health/ping"
        min: 3
    assertions:
      - response_status: 200
      - response_body_matches:
          ok: true
      - response_header:
          name: "Cache-Control"
          matches_regex: "no-store"

  - id: RQ-017
    priority: P0
    story: US-3
    jira: MTB-1452
    title: "Per-message tag comment renders inline for each tagged message (FR-022)"
    requirement_refs: [FR-022]
    depends_on: [RQ-011]
    description: >-
      Validates the FR-022 contract end-to-end after the US-3 refactor:
      (1) the session-level `Tag comment` textbox that used to live in
          the right-hand review panel is no longer rendered;
      (2) each message that carries >=1 clinical tag gets its own
          inline `<MessageTagComment>` (testid
          `message-tag-comment-<messageId>`) with a textarea and an
          "Auto-saved on blur" hint;
      (3) typing text + blurring triggers a PUT
          `/api/review/sessions/{id}/message-tag-comments/{messageId}`
          that returns 200 + `{ success: true, data: { comment: {...}}}`;
      (4) the comment persists after a full-page reload — GET
          `/api/review/sessions/{id}/message-tag-comments` returns an
          entry for the targeted messageId with the exact text;
      (5) removing the clinical tag hides the comment field on the
          next render (parent gates visibility on tag presence).
    steps:
      - action: navigate_to_session_with_clinical_tags
      - action: assert_element_absent
