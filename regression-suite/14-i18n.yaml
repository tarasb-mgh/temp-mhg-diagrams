      - pattern: "[a-z]+\\.[a-z]+\\.[a-z]+"
        meaning: "Literal i18n key in metric label"

  # ---------------------------------------------------------------------------
  # I18N-005  No dot-notation literal keys in any locale
  # ---------------------------------------------------------------------------
  - id: I18N-005
    title: "No dot-notation literal keys in any locale"
    priority: P0
    tags: [i18n, locale, literal-keys, quality]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "User is authenticated as owner (via AUTH-001)"
      - "UI is in English locale"
    depends_on: [AUTH-001]
    known_issues:
      - id: KI-001
        description: "gradeDescription.buttonAriaLabel is a known literal key that has not been translated"
        severity: low
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}"
        assert: "Dashboard loaded"

      - action: browser_snapshot
        params: {}
        assert: "English locale full page snapshot"
        check: no_literal_i18n_keys
        expect: >
          Scan visible text for patterns matching [a-z]+\.[a-z]+(\.[a-z]+)+.
          Exclude URLs, email addresses, and file paths.
          Known issue: gradeDescription.buttonAriaLabel is expected (KI-001).

      - action: browser_click
        params:
          selector: "[data-testid='language-selector'], [aria-label*='language' i], [aria-label*='locale' i], button:has-text('EN'), button:has-text('English')"
        assert: "Language selector opened"

      - action: browser_click
        params:
          selector: "[data-value='uk'], li:has-text('Ukrainian'), li:has-text('Українська'), option:has-text('Ukrainian'), option:has-text('Українська')"
        assert: "Ukrainian locale selected"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 5000
        assert: "Page rendered in Ukrainian"

      - action: browser_snapshot
        params: {}
        assert: "Ukrainian locale full page snapshot"
        check: no_literal_i18n_keys
        expect: >
          Scan visible text for dot-notation patterns.
          Exclude URLs, emails, file paths.
          Known issue: gradeDescription.buttonAriaLabel is expected (KI-001).

      - action: browser_click
        params:
          selector: "[data-testid='language-selector'], [aria-label*='language' i], [aria-label*='locale' i], button:has-text('UK'), button:has-text('Українська')"
        assert: "Language selector opened"

      - action: browser_click
        params:
          selector: "[data-value='ru'], li:has-text('Russian'), li:has-text('Русский'), option:has-text('Russian'), option:has-text('Русский')"
        assert: "Russian locale selected"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 5000
        assert: "Page rendered in Russian"

      - action: browser_snapshot
        params: {}
        assert: "Russian locale full page snapshot"
        check: no_literal_i18n_keys
        expect: >
          Scan visible text for dot-notation patterns.
          Exclude URLs, emails, file paths.
          Known issue: gradeDescription.buttonAriaLabel is expected (KI-001).

      - action: browser_click
        params:
          selector: "[data-testid='language-selector'], [aria-label*='language' i], [aria-label*='locale' i], button:has-text('RU'), button:has-text('Русский')"
        assert: "Language selector opened to switch back"

      - action: browser_click
        params:
          selector: "[data-value='en'], li:has-text('English'), option:has-text('English')"
        assert: "English locale restored"

      - action: evidence_capture
        params:
          label: "I18N-005-no-literal-keys"
          include: [screenshot, console]
        assert: "Evidence bundle saved"

    pass_criteria:
      - "No dot-notation literal i18n keys visible in English locale (excluding KI-001)"
      - "No dot-notation literal i18n keys visible in Ukrainian locale (excluding KI-001)"
      - "No dot-notation literal i18n keys visible in Russian locale (excluding KI-001)"
      - "URLs, email addresses, and file paths are excluded from literal key detection"
    error_signatures:
      - pattern: "[a-z]+\\.[a-z]+\\.[a-z]+"
        meaning: "Potential literal i18n key found in UI — verify it is not a URL/email/path"
      - pattern: "missing.*translation"
        meaning: "Translation system reported a missing key"

  # ---------------------------------------------------------------------------
  # I18N-006  Security section English-only documented
  # ---------------------------------------------------------------------------
  - id: I18N-006
    title: "Security section English-only documented"
    priority: P3
    tags: [i18n, locale, ukrainian, security, known-issue]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "User is authenticated as owner (via AUTH-001)"
      - "UI is in English locale"
    depends_on: [AUTH-001]
    known_issues:
      - id: KI-002
        description: "Security section labels remain in English when locale is switched to Ukrainian or Russian"
        severity: low
    steps:
      - action: browser_click
        params:
          selector: "[data-testid='language-selector'], [aria-label*='language' i], [aria-label*='locale' i], button:has-text('EN'), button:has-text('English')"
        assert: "Language selector opened"

      - action: browser_click
        params:
          selector: "[data-value='uk'], li:has-text('Ukrainian'), li:has-text('Українська'), option:has-text('Ukrainian'), option:has-text('Українська')"
        assert: "Ukrainian locale selected"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 5000
        assert: "Sidebar visible in Ukrainian"

      - action: browser_click
        params:
          selector: "nav >> text=Security, aside >> text=Security, [class*='sidebar'] >> text=Security"
        assert: "Security group clicked to expand"

      - action: browser_snapshot
        params: {}
        assert: "Security section snapshot in Ukrainian locale"
        expect: >
          Document that Security section labels remain in English.
          This is a known issue (KI-002). Labels such as Dashboard,
          Principal Groups, Permissions, Assignments, Effective Permissions
          are expected to still be in English.

      - action: browser_click
        params:
          selector: "[data-testid='language-selector'], [aria-label*='language' i], [aria-label*='locale' i], button:has-text('UK'), button:has-text('Українська')"
        assert: "Language selector opened to switch back"

      - action: browser_click
        params:
          selector: "[data-value='en'], li:has-text('English'), option:has-text('English')"
        assert: "English locale restored"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "nav, aside, [class*='sidebar' i]"
          timeout: 5000
        assert: "Sidebar visible after switching back to English"

      - action: browser_snapshot
        params: {}
        assert: "Sidebar restored to English"
        expect: "All sidebar labels are back in English"

      - action: evidence_capture
        params:
          label: "I18N-006-security-english-only"
          include: [screenshot]
        assert: "Evidence bundle saved"

    pass_criteria:
      - "Security section labels are documented as remaining in English (KI-002)"
      - "Switching back to English restores all labels correctly"
      - "No unhandled errors during locale switching"
    error_signatures:
      - pattern: "TypeError"
        meaning: "Crash during locale switch in Security section"
