# MHG Workbench Regression Suite — 10 Group Management
# 8 tests covering group list, group detail, members, invitation codes,
# surveys navigation, group dashboard, and group users.
#
# All tests assume owner role and depend on AUTH-001 for an active session.

module:
  id: 10-group-management
  title: "Group Management"
  description: >
    Validates that group management pages render correctly: groups list,
    group detail with members, invitation codes, survey navigation,
    group dashboard, and group-scoped user list.
  gate: false

tests:

  # ---------------------------------------------------------------------------
  # GM-001  Groups list loads
  # ---------------------------------------------------------------------------
  - id: GM-001
    title: "Groups list loads"
    priority: P0
    tags: [groups, list, smoke]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner with full sidebar access"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/groups"
        assert: "Groups page loaded"
        expect: "Group management page renders"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "table, [class*='group-list' i], [class*='groupList' i], [data-testid*='group' i]"
          timeout: 10000
        assert: "Groups table or list is visible"

      - action: browser_snapshot
        params: {}
        assert: "Groups list snapshot captured"
        expect: "Groups list/table is visible with at least one group row"

      - action: evidence_capture
        params:
          label: "GM-001-groups-list"
          include: [screenshot, console, network]
        assert: "Evidence bundle saved"

    pass_criteria:
      - "Groups table or list is rendered with at least one group"
      - "No unexpected console errors or 5xx network responses"
    error_signatures:
      - pattern: "403.*api/groups"
        meaning: "Groups list fetch failed — permission denied"
      - pattern: "TypeError"
        meaning: "Null guard missing in groups list component"

  # ---------------------------------------------------------------------------
  # GM-002  Group detail shows members
  # ---------------------------------------------------------------------------
  - id: GM-002
    title: "Group detail shows members"
    priority: P1
    tags: [groups, detail, members]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner with full sidebar access"
      - "Groups list page is loaded (via GM-001)"
    depends_on: [AUTH-001, GM-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/groups"
        assert: "Groups page loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "table, [class*='group-list' i], [class*='groupList' i], [data-testid*='group' i]"
          timeout: 10000
        assert: "Groups list is visible"

      - action: browser_click
        params:
          selector: "table tbody tr:first-child, [class*='group-list' i] > *:first-child, [class*='groupList' i] > *:first-child"
        assert: "First group row clicked"
        expect: "Navigation to group detail page"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='member' i], [class*='group-detail' i], [class*='groupDetail' i], [data-testid*='group-detail' i], table"
          timeout: 10000
        assert: "Group detail page is visible"

      - action: browser_snapshot
        params: {}
        assert: "Group detail snapshot captured"
        expect: "Group detail page renders with a member list visible"

      - action: evidence_capture
        params:
          label: "GM-002-group-detail-members"
          include: [screenshot, console, network]
        assert: "Evidence captured"

    pass_criteria:
      - "Clicking a group navigates to group detail view"
      - "Member list is visible within the group detail"
      - "No unhandled JavaScript errors during navigation"
    error_signatures:
      - pattern: "404.*api/groups/"
        meaning: "Group detail endpoint not found"
      - pattern: "TypeError"
        meaning: "Crash rendering group detail component"

  # ---------------------------------------------------------------------------
  # GM-003  Members list shows roles + remove
  # ---------------------------------------------------------------------------
  - id: GM-003
    title: "Members list shows roles + remove buttons"
    priority: P1
    tags: [groups, members, roles, actions]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner with full sidebar access"
      - "Group detail page is loaded (via GM-002)"
    depends_on: [AUTH-001, GM-002]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/groups"
        assert: "Groups page loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "table, [class*='group-list' i], [class*='groupList' i], [data-testid*='group' i]"
          timeout: 10000
        assert: "Groups list is visible"

      - action: browser_click
        params:
          selector: "table tbody tr:first-child, [class*='group-list' i] > *:first-child, [class*='groupList' i] > *:first-child"
        assert: "First group clicked"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='member' i], [class*='group-detail' i], [class*='groupDetail' i], [data-testid*='group-detail' i], table"
          timeout: 10000
        assert: "Group detail loaded"

      - action: browser_snapshot
        params: {}
        assert: "Members list snapshot with roles and actions"
        expect: >
          Member rows show role labels (e.g., Owner, Member, Moderator)
          and have remove or action buttons visible

      - action: evidence_capture
        params:
          label: "GM-003-member-roles-actions"
          include: [screenshot]
        assert: "Evidence captured"

    pass_criteria:
      - "At least one member row displays a role label"
      - "Remove or action buttons are present on member rows"
    error_signatures:
      - pattern: "undefined.*role"
        meaning: "Role data missing from members response"
      - pattern: "TypeError"
        meaning: "Crash rendering member row actions"

  # ---------------------------------------------------------------------------
