        assert: "First group clicked"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='member' i], [class*='group-detail' i], [class*='groupDetail' i], [data-testid*='group-detail' i]"
          timeout: 10000
        assert: "Group detail loaded"

      - action: browser_snapshot
        params: {}
        assert: "Invitation creation area snapshot"
        expect: >
          A 'require approval' checkbox or toggle is visible within the
          invitation creation controls

      - action: evidence_capture
        params:
          label: "GM-005-require-approval-checkbox"
          include: [screenshot]
        assert: "Evidence captured"

    pass_criteria:
      - "'Require approval' checkbox or toggle is present in the invitation creation area"
    error_signatures:
      - pattern: "undefined.*approval"
        meaning: "Approval option not rendered in invitation form"

  # ---------------------------------------------------------------------------
  # GM-006  Surveys button navigates to group surveys
  # ---------------------------------------------------------------------------
  - id: GM-006
    title: "Surveys button navigates to group surveys"
    priority: P1
    tags: [groups, surveys, navigation]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner with full sidebar access"
      - "Group detail page is loaded (via GM-002)"
    depends_on: [AUTH-001, GM-002]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/groups"
        assert: "Groups page loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "table, [class*='group-list' i], [class*='groupList' i], [data-testid*='group' i]"
          timeout: 10000
        assert: "Groups list is visible"

      - action: browser_click
        params:
          selector: "table tbody tr:first-child, [class*='group-list' i] > *:first-child, [class*='groupList' i] > *:first-child"
        assert: "First group clicked"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='member' i], [class*='group-detail' i], [class*='groupDetail' i], [data-testid*='group-detail' i]"
          timeout: 10000
        assert: "Group detail loaded"

      - action: browser_click
        params:
          selector: "button:has-text('Surveys'), a:has-text('Surveys'), [data-testid*='survey' i]:has-text('Surveys'), [role='tab']:has-text('Surveys')"
        assert: "Surveys button or tab clicked"
        expect: "Navigation to group surveys page"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='survey' i], [data-testid*='survey' i], table, *:has-text('Survey')"
          timeout: 10000
        assert: "Group surveys page is visible"

      - action: browser_snapshot
        params: {}
        assert: "Group surveys page snapshot"
        expect: "Group surveys page renders with survey list or empty state"

      - action: evidence_capture
        params:
          label: "GM-006-group-surveys"
          include: [screenshot, console, network]
        assert: "Evidence captured"

    pass_criteria:
      - "Clicking Surveys button/tab navigates to group surveys page"
      - "Group surveys page renders without errors"
    error_signatures:
      - pattern: "404.*surveys"
        meaning: "Group surveys route or endpoint not found"
      - pattern: "TypeError"
        meaning: "Crash during navigation to group surveys"

  # ---------------------------------------------------------------------------
  # GM-007  Group Dashboard loads
  # ---------------------------------------------------------------------------
  - id: GM-007
    title: "Group Dashboard loads"
    priority: P1
    tags: [groups, dashboard, group-scope]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner with full sidebar access"
      - "A group is selected via the scope selector"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/group"
        assert: "Group Dashboard page loaded"
        expect: "Group dashboard renders with group-specific data"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='dashboard' i], [class*='group-dashboard' i], [data-testid*='dashboard' i], [data-testid*='group' i]"
          timeout: 10000
        assert: "Group dashboard content is visible"

      - action: browser_snapshot
        params: {}
        assert: "Group Dashboard snapshot captured"
        expect: "Group dashboard renders with group-specific data, charts, or summary information"

      - action: evidence_capture
        params:
          label: "GM-007-group-dashboard"
          include: [screenshot, console, network]
        assert: "Evidence captured"

    pass_criteria:
      - "Group Dashboard page renders without errors"
      - "Dashboard shows group-specific data or content"
      - "No 5xx network responses"
    error_signatures:
      - pattern: "403.*api/group"
        meaning: "Group dashboard data fetch failed — permission denied"
      - pattern: "TypeError"
        meaning: "Crash rendering group dashboard component"
      - pattern: "No group selected"
        meaning: "Group scope not set — scope selector may need interaction first"

  # ---------------------------------------------------------------------------
  # GM-008  Group Users page loads
  # ---------------------------------------------------------------------------
  - id: GM-008
    title: "Group Users page loads"
    priority: P2
    tags: [groups, users, group-scope]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner with full sidebar access"
      - "A group is selected via the scope selector"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/group/users"
        assert: "Group Users page loaded"
        expect: "Group-scoped user list renders"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "table, [class*='user-list' i], [class*='userList' i], [data-testid*='user' i], [class*='group-users' i]"
          timeout: 10000
        assert: "Group-scoped user list is visible"

      - action: browser_snapshot
        params: {}
        assert: "Group Users page snapshot captured"
        expect: "Group-scoped user list renders with users belonging to the selected group"

      - action: evidence_capture
        params:
          label: "GM-008-group-users"
          include: [screenshot, console, network]
        assert: "Evidence captured"

    pass_criteria:
      - "Group Users page renders without errors"
      - "User list shows users scoped to the selected group"
      - "No 5xx network responses"
    error_signatures:
      - pattern: "403.*api/group/users"
        meaning: "Group users fetch failed — permission denied"
      - pattern: "TypeError"
        meaning: "Crash rendering group users component"
      - pattern: "No group selected"
        meaning: "Group scope not set — scope selector may need interaction first"
