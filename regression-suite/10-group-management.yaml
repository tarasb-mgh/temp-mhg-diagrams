  # ---------------------------------------------------------------------------
  # GM-005  Require approval checkbox on invite
  # ---------------------------------------------------------------------------
  - id: GM-005
    title: "Require approval checkbox on invite creation"
    priority: P2
    tags: [groups, invitations, approval]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Authenticated as owner with full sidebar access"
      - "Invitation codes section accessible (via GM-004)"
    depends_on: [AUTH-001, GM-004]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/groups"
        assert: "Groups page loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "table, [class*='group-list' i], [class*='groupList' i], [data-testid*='group' i]"
          timeout: 10000
