# MHG Workbench Regression Suite — 12 Security Administration
# 7 tests covering security dashboard, principal groups, permissions, assignments,
# effective permissions view, role-based visibility, and feature flag controls
#
# Variables resolved from _config.yaml:
#   ${workbench_url}  — environments.<env>.workbench_url
#   ${account.<role>}  — accounts.<role>.email / otp_source / otp_pattern
#   ${otp_code}       — extracted at runtime from browser console

module:
  id: 12-security-admin
  title: "Security Administration"
  description: >
    Validates that the Security section pages load correctly for owner role,
    that non-owner roles cannot see the Security navigation group, and that
    the Dynamic Permissions feature flag toggle is present on the dashboard.
  gate: false

tests:

  # ---------------------------------------------------------------------------
  # SA-001  Security Dashboard loads
  # ---------------------------------------------------------------------------
  - id: SA-001
    title: "Security Dashboard loads"
    priority: P1
    tags: [security, dashboard, smoke]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "User is authenticated as owner (via AUTH-001)"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/security"
        assert: "Page loads without network errors"
        expect: "Security dashboard page is displayed"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[data-testid='security-dashboard'], [class*='security' i], [class*='dashboard' i], main, [role='main']"
          timeout: 10000
        assert: "Security dashboard content is visible within timeout"

      - action: browser_snapshot
        params: {}
        assert: "Security dashboard snapshot captured"
        expect: "Security dashboard renders with feature flags section or similar controls"

      - action: evidence_capture
        params:
          label: "SA-001-security-dashboard"
          include: [screenshot, console, network]
        assert: "Evidence bundle saved"

    pass_criteria:
      - "Security dashboard page renders without errors"
      - "Feature flags section or similar controls are visible"
      - "No unexpected console errors or 4xx/5xx network responses"
    error_signatures:
      - pattern: "403.*api/"
        meaning: "Permission denied — owner may not have security access"
      - pattern: "TypeError"
        meaning: "Null guard missing in security dashboard component"

