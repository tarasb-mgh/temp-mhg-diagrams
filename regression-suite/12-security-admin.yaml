  # ---------------------------------------------------------------------------
  # SA-006  Security section hidden for non-owner
  # ---------------------------------------------------------------------------
  - id: SA-006
    title: "Security section hidden for non-owner"
    priority: P2
    tags: [security, rbac, sidebar, negative]
    role: moderator
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "e2e-moderator@test.local account exists with 'moderator' role"
    depends_on: []
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}"
        assert: "Login page loaded"

      - action: browser_click
        params:
          selector: "button:has-text('Sign In to Start'), button:has-text('Sign in to Start')"
        assert: "Sign-in expanded"

      - action: browser_fill_form
        params:
          selector: "input[type='email'], input[name='email'], input[placeholder*='email' i]"
          value: "${account.moderator.email}"
        assert: "Moderator email entered"

      - action: browser_click
        params:
          selector: "button:has-text('Send Code'), button:has-text('Send code'), button[type='submit']"
        assert: "OTP requested"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "input[name='otp'], input[aria-label*='code' i], input[placeholder*='code' i], input[type='tel']"
          timeout: 8000
        assert: "OTP input visible"

      - action: browser_console_messages
        params: {}
        extract:
          variable: otp_code
          pattern: "Code:\\s+(\\d{6})"
          group: 1

      - action: browser_fill_form
        params:
          selector: "input[name='otp'], input[aria-label*='code' i], input[placeholder*='code' i], input[type='tel']"
          value: "${otp_code}"
        assert: "OTP entered"

      - action: browser_click
        params:
          selector: "button:has-text('Verify'), button:has-text('Submit'), button[type='submit']"
        assert: "OTP submitted"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[data-testid='dashboard'], nav, aside, [class*='sidebar' i]"
          timeout: 10000
        assert: "Dashboard loaded for moderator"

      - action: browser_snapshot
        params: {}
        assert: "Moderator sidebar captured"
        expect: >
          Sidebar is visible. The Security navigation group is NOT present.
          Moderator should see Reviews and People & Access but NOT Security.

      - action: evidence_capture
        params:
          label: "SA-006-security-hidden-moderator"
          include: [screenshot, console]
        assert: "Evidence bundle saved"

    pass_criteria:
      - "Moderator can log in and see the workbench sidebar"
      - "Security navigation group is NOT visible in the sidebar"
      - "No unhandled errors during login or sidebar rendering"
    error_signatures:
      - pattern: "Security"
        meaning: "Security section visible to moderator — RBAC violation"
      - pattern: "403.*api/permissions"
        meaning: "Permission fetch failed for moderator role"

  # ---------------------------------------------------------------------------
  # SA-007  Feature flag toggle present
  # ---------------------------------------------------------------------------
  - id: SA-007
    title: "Feature flag toggle present"
    priority: P2
    tags: [security, feature-flag, dashboard]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "User is authenticated as owner (via AUTH-001)"
      - "Security dashboard is accessible (SA-001 passed)"
    depends_on: [SA-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/security"
        assert: "Security dashboard loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[data-testid='security-dashboard'], [class*='security' i], [class*='dashboard' i], main, [role='main']"
          timeout: 10000
        assert: "Security dashboard content is visible"

      - action: browser_snapshot
        params: {}
        assert: "Security dashboard snapshot captured"
        expect: >
          A 'Dynamic Permissions' toggle, checkbox, or switch is visible on the
          security dashboard. Do NOT toggle or click it — only verify presence.

      - action: evidence_capture
        params:
          label: "SA-007-feature-flag-toggle"
          include: [screenshot, console]
        assert: "Evidence bundle saved"

    pass_criteria:
      - "A 'Dynamic Permissions' toggle, checkbox, or switch element is present on the security dashboard"
      - "The toggle is NOT clicked or changed — presence-only verification"
      - "No unexpected console errors"
    error_signatures:
      - pattern: "TypeError"
        meaning: "Feature flag component failed to render"
      - pattern: "undefined.*feature"
        meaning: "Feature flags data not loaded"
