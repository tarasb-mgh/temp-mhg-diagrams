          timeout: 10000
        assert: "Schema list or empty state visible"

      - action: browser_click
        params:
          selector: "button:has-text('New Schema'), button:has-text('Create'), a:has-text('New Schema'), a:has-text('Create'), [data-testid*='survey.schemas.create' i]"
        assert: "Create new schema button clicked"
        expect: "Schema editor form appears"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "input[name='title'], input[placeholder*='title' i], input[placeholder*='name' i], [data-testid*='schema-title' i], [class*='editor' i]"
          timeout: 10000
        assert: "Editor form is visible with title field"

      - action: browser_fill_form
        params:
          selector: "input[name='title'], input[placeholder*='title' i], input[placeholder*='name' i], [data-testid*='schema-title' i]"
          value: "Choice Options Test SS-016"
        assert: "Schema title filled"

      - action: browser_click
        params:
          selector: "button:has-text('Add Question'), button:has-text('Add Field'), button:has-text('Add Item'), [data-testid*='add-question' i]"
        assert: "Add Question button clicked for single_choice question"

      - action: browser_evaluate
        params:
          expression: |
            // Select single_choice type for the first question
            const typeSelect = document.querySelector(
              "select[name*='type'], [data-testid*='question-type'], [role='listbox']"
            );
            if (typeSelect) {
              typeSelect.value = 'single_choice';
              typeSelect.dispatchEvent(new Event('change', { bubbles: true }));
            }
            await new Promise(r => setTimeout(r, 500));
            // Fill question text
            const textInput = document.querySelector(
              "input[name*='text'], input[placeholder*='question' i], textarea[name*='text']"
            );
            if (textInput) {
              textInput.value = 'What is your gender?';
              textInput.dispatchEvent(new Event('input', { bubbles: true }));
            }
            await new Promise(r => setTimeout(r, 300));
            // Add 3 options: Male, Female, Other
            const options = ['Male', 'Female', 'Other'];
            for (const opt of options) {
              const addOptionBtn = [...document.querySelectorAll('button')].find(
                b => /add.*(option|choice)/i.test(b.textContent)
              );
              if (addOptionBtn) addOptionBtn.click();
              await new Promise(r => setTimeout(r, 300));
              const optionInputs = document.querySelectorAll(
                "input[name*='option'], input[placeholder*='option' i], input[placeholder*='choice' i]"
              );
              const lastOption = optionInputs[optionInputs.length - 1];
              if (lastOption) {
                lastOption.value = opt;
                lastOption.dispatchEvent(new Event('input', { bubbles: true }));
              }
              await new Promise(r => setTimeout(r, 200));
            }
        assert: "Single choice question added with 3 options: Male, Female, Other"

      - action: browser_click
        params:
          selector: "button:has-text('Add Question'), button:has-text('Add Field'), button:has-text('Add Item'), [data-testid*='add-question' i]"
        assert: "Add Question button clicked for multi_choice question"

      - action: browser_evaluate
        params:
          expression: |
            // Select multi_choice type for the second question
            const typeSelects = document.querySelectorAll(
              "select[name*='type'], [data-testid*='question-type'], [role='listbox']"
            );
            const lastTypeSelect = typeSelects[typeSelects.length - 1];
            if (lastTypeSelect) {
              lastTypeSelect.value = 'multi_choice';
              lastTypeSelect.dispatchEvent(new Event('change', { bubbles: true }));
            }
            await new Promise(r => setTimeout(r, 500));
            // Fill question text for second question
            const textInputs = document.querySelectorAll(
              "input[name*='text'], input[placeholder*='question' i], textarea[name*='text']"
            );
            const lastTextInput = textInputs[textInputs.length - 1];
            if (lastTextInput) {
              lastTextInput.value = 'Which topics concern you?';
              lastTextInput.dispatchEvent(new Event('input', { bubbles: true }));
            }
            await new Promise(r => setTimeout(r, 300));
            // Add 4 options: Anxiety, Depression, Stress, Self-esteem
            const options = ['Anxiety', 'Depression', 'Stress', 'Self-esteem'];
            for (const opt of options) {
              const addOptionBtns = [...document.querySelectorAll('button')].filter(
                b => /add.*(option|choice)/i.test(b.textContent)
              );
              const lastAddBtn = addOptionBtns[addOptionBtns.length - 1];
              if (lastAddBtn) lastAddBtn.click();
              await new Promise(r => setTimeout(r, 300));
              const optionInputs = document.querySelectorAll(
                "input[name*='option'], input[placeholder*='option' i], input[placeholder*='choice' i]"
              );
              const lastOption = optionInputs[optionInputs.length - 1];
              if (lastOption) {
                lastOption.value = opt;
                lastOption.dispatchEvent(new Event('input', { bubbles: true }));
              }
              await new Promise(r => setTimeout(r, 200));
            }
        assert: "Multi choice question added with 4 options: Anxiety, Depression, Stress, Self-esteem"

      - action: browser_wait_for
        params:
          state: "idle"
          timeout: 4000
        assert: "Wait 4 seconds for debounce and autosave"

      - action: browser_network_requests
        params: {}
        assert: "Network requests captured after autosave"
        expect: >
          PATCH request returns HTTP 200 and payload includes both questions:
          single_choice with options ['Male', 'Female', 'Other'] and
          multi_choice with options ['Anxiety', 'Depression', 'Stress', 'Self-esteem']

      - action: browser_snapshot
        params: {}
        assert: "Post-autosave snapshot with choice questions captured"
        expect: "Both choice questions with their options are visible in the editor"

      - action: evidence_capture
        params:
          label: "SS-016-choice-options"
          include: [screenshot, console, network]
        assert: "Evidence bundle saved"

    pass_criteria:
      - "Single choice question is created with 3 options (Male, Female, Other)"
      - "Multi choice question is created with 4 options (Anxiety, Depression, Stress, Self-esteem)"
      - "Autosave PATCH payload includes correct options arrays for both questions"
      - "PATCH returns HTTP 200"
    error_signatures:
      - pattern: "400.*api/"
        meaning: "Options validation error — choice format may be incorrect"
      - pattern: "500.*api/"
        meaning: "Server error serializing choice options"
      - pattern: "TypeError"
        meaning: "Choice option component failed to render or serialize"

  # ---------------------------------------------------------------------------
  # SS-017  Save error shows retry button
  # ---------------------------------------------------------------------------
  - id: SS-017
    title: "Save error shows retry button"
    priority: P1
    tags: [survey, schema, autosave, error, negative]
    role: owner
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "User is authenticated as owner (via AUTH-001)"
    depends_on: [AUTH-001]
    steps:
      - action: browser_navigate
        params:
          url: "${workbench_url}/workbench/surveys/schemas"
        assert: "Schema list page loaded"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "table, [class*='list' i], [class*='schema' i], *:has-text('Create'), *:has-text('New Schema')"
          timeout: 10000
        assert: "Schema list or empty state visible"

      - action: browser_click
        params:
          selector: "button:has-text('New Schema'), button:has-text('Create'), a:has-text('New Schema'), a:has-text('Create'), [data-testid*='survey.schemas.create' i]"
        assert: "Create new schema button clicked"
        expect: "Schema editor form appears"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "input[name='title'], input[placeholder*='title' i], input[placeholder*='name' i], [data-testid*='schema-title' i], [class*='editor' i]"
          timeout: 10000
        assert: "Editor form is visible with title field"

      - action: browser_fill_form
        params:
          selector: "input[name='title'], input[placeholder*='title' i], input[placeholder*='name' i], [data-testid*='schema-title' i]"
          value: "Error Retry Test SS-017"
        assert: "Schema title filled initially to trigger a successful first save"

      - action: browser_wait_for
        params:
          state: "idle"
          timeout: 3000
        assert: "Wait for initial autosave to complete"

      - action: browser_evaluate
        params:
          expression: |
            // Intercept the next PATCH request and simulate a 500 error
            const originalFetch = window.fetch;
            let intercepted = false;
            window.fetch = function(...args) {
              const [url, options] = args;
              if (!intercepted && options && options.method === 'PATCH') {
                intercepted = true;
                return Promise.resolve(new Response(
                  JSON.stringify({ error: 'Internal Server Error' }),
                  { status: 500, statusText: 'Internal Server Error', headers: { 'Content-Type': 'application/json' } }
                ));
              }
              return originalFetch.apply(this, args);
            };
        assert: "Network intercept installed to simulate 500 error on next PATCH"

      - action: browser_fill_form
        params:
          selector: "input[name='title'], input[placeholder*='title' i], input[placeholder*='name' i], [data-testid*='schema-title' i]"
          value: "Error Retry Test SS-017 — edited"
        assert: "Title edited to trigger autosave with intercepted 500 error"

      - action: browser_wait_for
        params:
          state: "idle"
          timeout: 3000
        assert: "Wait 3 seconds for debounce and error response"

      - action: browser_snapshot
        params: {}
        assert: "Snapshot captured after simulated save failure"
        expect: >
          Save status element shows 'Save failed' or equivalent error message
          with a 'Retry' button visible

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "*:has-text('Save failed'), *:has-text('Error'), *:has-text('Failed'), *:has-text('retry'), button:has-text('Retry'), [data-testid*='retry' i], [class*='error' i][class*='save' i]"
          timeout: 5000
        assert: "Error state with retry option is visible"
        expect: "Save status shows failure message and a Retry button is available"

      - action: evidence_capture
        params:
          label: "SS-017-save-error-retry"
          include: [screenshot, console, network]
        assert: "Evidence bundle saved"

    pass_criteria:
      - "When autosave PATCH receives a 500 error, the save status shows 'Save failed'"
      - "A 'Retry' button is visible to allow the user to re-attempt the save"
      - "The error state is clearly distinguishable from the normal 'Saved' state"
    error_signatures:
      - pattern: "Unhandled.*rejection"
        meaning: "Autosave error not caught — missing error handler for PATCH failure"
      - pattern: "TypeError"
        meaning: "Error state rendering failed in save status component"
