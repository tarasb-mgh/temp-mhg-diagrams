          value: "Я постійно тривожусь, у мене панічні атаки щодня, мене трясе, нудить, запаморочення, серце стискає, не можу спати, не можу працювати, уникаю людей, все дратує, не можу дихати нормально, не можу зосередитися"
        assert: "12+ anxiety symptoms described"

      - action: browser_click
        params:
          selector: "button[type='submit'], button:has-text('Send'), button[aria-label*='send' i]"
