          selector: "textarea, input[type='text'], [contenteditable='true']"
          value: "Я тривожусь щодня, не можу контролювати хвилювання, серце часто стукає, важко дихати, дратуюсь через дрібниці, на роботі не можу нормально працювати, уникаю зустрічей"
        assert: "7+ anxiety symptoms (moderate)"

      - action: browser_click
        params:
