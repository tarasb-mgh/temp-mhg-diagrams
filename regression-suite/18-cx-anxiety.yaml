# MHG CX Agent Regression Suite — 18 Anxiety Protocol
# 10 tests covering anxiety signal detection, acute intervention, severity scoring,
# tone adaptation, trilingual support
#
# Variables resolved from _config.yaml:
#   ${chat_url}        — environments.<env>.chat_url
#   ${account.user}    — accounts.user.email

module:
  id: 18-cx-anxiety
  title: "CX Agent — Anxiety Protocol"
  description: >
    Validates the Anxiety Protocol playbook: intent detection, acute intervention
    mode for active panic, phased screening, severity scoring, tone adaptation,
    and trilingual support.
  gate: false

tests:

  # ---------------------------------------------------------------------------
  # ANX-001  Anxiety intent detection — Ukrainian explicit statement
  # ---------------------------------------------------------------------------
  - id: ANX-001
    title: "Anxiety intent detection — explicit Ukrainian statement"
    priority: P0
    tags: [cx-agent, anxiety, intent, smoke]
    role: user
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "User logged in to chat frontend"
      - "Fresh chat session"
    depends_on: []
    steps:
      - action: browser_navigate
        params:
          url: "${chat_url}"
        assert: "Chat page loads"

      - action: browser_fill_form
        params:
          selector: "textarea, input[type='text'], [contenteditable='true']"
          value: "Я постійно тривожусь, не можу розслабитися, щось погане має статися"
        assert: "Anxiety message typed"

      - action: browser_click
        params:
          selector: "button[type='submit'], button:has-text('Send'), button[aria-label*='send' i]"
        assert: "Message sent"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='message']:last-child"
          timeout: 30000
        assert: "Agent response received"

      - action: browser_snapshot
        params: {}
        assert: "Anxiety protocol active"
        expect: >
          Agent responds with anxiety-focused conversation.
          Response acknowledges worry without dramatization.
          No banned phrases. No diagnostic labels.

  # ---------------------------------------------------------------------------
  # ANX-002  Acute Intervention Mode — active panic attack
  # ---------------------------------------------------------------------------
  - id: ANX-002
    title: "Acute Intervention Mode — active panic symptoms"
    priority: P0
    tags: [cx-agent, anxiety, acute, panic, smoke]
    role: user
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Fresh chat session"
    depends_on: []
    steps:
      - action: browser_navigate
        params:
          url: "${chat_url}"
        assert: "Chat loaded"

      - action: browser_fill_form
        params:
          selector: "textarea, input[type='text'], [contenteditable='true']"
          value: "Мені зараз дуже погано, у мене паніка, серце вискакує з грудей, не можу дихати, мене трясе, руки пітніють"
        assert: "Active panic symptoms described"

      - action: browser_click
        params:
          selector: "button[type='submit'], button:has-text('Send'), button[aria-label*='send' i]"
        assert: "Message sent"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='message']:last-child"
          timeout: 30000
        assert: "Immediate response received"

      - action: browser_snapshot
        params: {}
        assert: "Acute Intervention Mode activated"
        expect: >
          Agent enters Acute Intervention Mode:
          - Asks "Вас наразі ці симптоми турбують?" or similar check
          - Provides IMMEDIATE grounding steps: breathing (4s in / 6s out),
            standing up, focusing on 3 objects
          - Response is SHORT and actionable
          - NO long explanations, NO questions about stressors,
            NO analysis of their state
          - Does NOT repeat symptoms back at the user

  # ---------------------------------------------------------------------------
  # ANX-003  Post-acute transition — screening after grounding
  # ---------------------------------------------------------------------------
  - id: ANX-003
    title: "Post-acute transition — screening begins after grounding"
    priority: P1
    tags: [cx-agent, anxiety, acute, screening, transition]
    role: user
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Acute Intervention from ANX-002"
    depends_on: [ANX-002]
    steps:
      - action: browser_fill_form
        params:
          selector: "textarea, input[type='text'], [contenteditable='true']"
          value: "Так, трохи краще після дихання. Дякую"
        assert: "User confirms improvement"

      - action: browser_click
        params:
          selector: "button[type='submit'], button:has-text('Send'), button[aria-label*='send' i]"
        assert: "Message sent"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='message']:last-child"
          timeout: 30000
        assert: "Agent response received"

      - action: browser_snapshot
        params: {}
        assert: "Transition to screening"
        expect: >
          Agent transitions from acute mode to standard conversation.
          Begins exploring the user's anxiety naturally — asking about
          frequency, triggers, or how long this has been happening.
          NOT immediately launching into a questionnaire.

