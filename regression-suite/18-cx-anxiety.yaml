  # ---------------------------------------------------------------------------
  # ANX-010  Correct response example — per specification
  # ---------------------------------------------------------------------------
  - id: ANX-010
    title: "Correct response pattern — grounded, not robotic"
    priority: P0
    tags: [cx-agent, anxiety, tone, example]
    role: user
    viewport: { width: 1280, height: 800 }
    prerequisites:
      - "Fresh chat session"
    depends_on: []
    steps:
      - action: browser_navigate
        params:
          url: "${chat_url}"
        assert: "Chat loaded"

      - action: browser_fill_form
        params:
          selector: "textarea, input[type='text'], [contenteditable='true']"
          value: "Я боюсь вийти на вулицю, я боюсь людей при тому що все добре але мене бросає в піт і трясуться руки, пересихає горло"
        assert: "Exact example from specification"

      - action: browser_click
        params:
          selector: "button[type='submit'], button:has-text('Send'), button[aria-label*='send' i]"
        assert: "Message sent"

      - action: browser_wait_for
        params:
          state: "visible"
          selector: "[class*='message']:last-child"
          timeout: 30000
        assert: "Response received"

      - action: browser_snapshot
        params: {}
        assert: "Response matches correct pattern from spec"
        expect: >
          Response MUST:
          - First check if user needs immediate help ("Вас наразі ці симптоми турбують?")
          - Be SHORT and actionable
          - NOT repeat all symptoms back ("пітливість, тремтіння рук і сухість у горлі")
          - NOT diagnose ("соціальний тривожний розлад", "агорафобія")
          - NOT use fragile tone ("дуже неприємні відчуття", "розумію що вам страшно")
          - NOT ask open-ended exploration questions while user is in distress
          Response MUST NOT match the "incorrect" example from spec.
