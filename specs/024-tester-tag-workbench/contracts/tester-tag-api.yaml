openapi: 3.1.0
info:
  title: Tester Tag Management API
  version: 1.0.0
  description: Dedicated workbench API for reading and updating tester-tag status.

paths:
  /api/admin/tester-tags/users:
    get:
      summary: List users for tester-tag management
      description: >
        Returns users visible in the dedicated tester tag-management page,
        including current tester-tag status and eligibility information.
        Available only to Admin, Supervisor, and Owner.
      tags: [TesterTags]
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Optional search text for user lookup
        - name: eligibility
          in: query
          required: false
          schema:
            type: string
            enum: [eligible, ineligible, all]
          description: Optional eligibility filter
      responses:
        '200':
          description: Matching users with tester-tag status
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TesterTagUserSummary'
        '403':
          description: Caller does not have access to the dedicated page

  /api/admin/tester-tags/users/{userId}:
    get:
      summary: Get tester-tag status for a user
      description: >
        Returns the current tester-tag state and eligibility for a single user.
        Available only to Admin, Supervisor, and Owner.
      tags: [TesterTags]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tester-tag status for the target user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TesterTagStatus'
        '403':
          description: Caller does not have access to the dedicated page
        '404':
          description: User not found

    put:
      summary: Set tester-tag state for a user
      description: >
        Assigns or removes the tester tag for a user from the dedicated
        tester tag-management page. Available only to Admin, Supervisor,
        and Owner. Assignment to regular end-user accounts is rejected.
      tags: [TesterTags]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTesterTagRequest'
      responses:
        '200':
          description: Updated tester-tag state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TesterTagStatus'
        '400':
          description: Invalid request or ineligible target user
        '403':
          description: Caller does not have access to the dedicated page
        '404':
          description: User not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TesterTagUserSummary:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
          format: email
        testerAssigned:
          type: boolean
        eligibility:
          type: string
          enum: [eligible, ineligible, unknown]
        eligibilityReason:
          type: string
          nullable: true

    TesterTagStatus:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        testerAssigned:
          type: boolean
        eligibility:
          type: string
          enum: [eligible, ineligible, unknown]
        eligibilityReason:
          type: string
          nullable: true
        assignedAt:
          type: string
          format: date-time
          nullable: true
        assignedBy:
          type: object
          nullable: true
          properties:
            userId:
              type: string
              format: uuid
            displayName:
              type: string

    SetTesterTagRequest:
      type: object
      required: [testerAssigned]
      properties:
        testerAssigned:
          type: boolean
