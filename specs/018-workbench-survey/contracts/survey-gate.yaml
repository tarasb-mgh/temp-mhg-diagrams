openapi: 3.0.3
info:
  title: Survey Gate API
  version: 1.0.0
  description: User-facing endpoints for the survey gate (pre-chat blocking flow)

paths:
  /api/chat/gate-check:
    get:
      summary: Check for pending surveys
      description: |
        Returns active survey instances targeting the user's groups where the user
        has not yet completed a response. Ordered by priority ASC, startDate ASC.
        If empty, the user can proceed to chat.
      tags: [Survey Gate]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending surveys for user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PendingSurvey'

  /api/chat/survey-responses:
    post:
      summary: Create or update survey response
      description: |
        Creates a new response for the given instance or updates an existing partial response.
        On final submission, sets isComplete to true and completedAt.
      tags: [Survey Gate]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instanceId, answers]
              properties:
                instanceId:
                  type: string
                  format: uuid
                answers:
                  type: array
                  items:
                    $ref: '#/components/schemas/SurveyAnswerInput'
                isComplete:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Response saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SurveyResponse'
        '422':
          description: Validation error (invalid answers, missing required fields on completion)

  /api/chat/survey-responses/{instanceId}:
    get:
      summary: Get own response for instance
      description: Returns the user's existing response (partial or complete) for resuming.
      tags: [Survey Gate]
      security:
        - bearerAuth: []
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Existing response or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SurveyResponse'
                    nullable: true
        '404':
          description: No response exists yet

  /api/chat/survey-responses/{id}:
    patch:
      summary: Save partial progress
      description: Updates answers for an in-progress response. Last-write-wins semantics.
      tags: [Survey Gate]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  items:
                    $ref: '#/components/schemas/SurveyAnswerInput'
      responses:
        '200':
          description: Progress saved
        '404':
          description: Response not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PendingSurvey:
      type: object
      properties:
        instance:
          $ref: '#/components/schemas/SurveyInstanceGate'
        existingResponse:
          $ref: '#/components/schemas/SurveyResponse'
          nullable: true
          description: Partial response for resuming, or null

    SurveyInstanceGate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        schemaId:
          type: string
          format: uuid
        schemaSnapshot:
          type: object
          description: Frozen schema snapshot used for rendering and validation
        title:
          type: string
        status:
          type: string
          enum: [active]
        priority:
          type: integer
        groupIds:
          type: array
          items:
            type: string
            format: uuid
        startDate:
          type: string
          format: date-time
        expirationDate:
          type: string
          format: date-time

    SurveyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        instanceId:
          type: string
          format: uuid
        pseudonymousId:
          type: string
          format: uuid
        answers:
          type: array
          items:
            $ref: '#/components/schemas/SurveyAnswerInput'
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        isComplete:
          type: boolean

    SurveyAnswerInput:
      type: object
      required: [questionId]
      properties:
        questionId:
          type: string
          format: uuid
        value:
          description: string, string[], boolean, or null depending on question type
